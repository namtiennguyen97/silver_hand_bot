<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITE STATISTICS - ADMIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #050a14;
            --primary: #00ffff;
            --accent: #ff00ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(0, 255, 255, 0.2);
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 15px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px var(--primary);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            letter-spacing: 3px;
            margin: 0;
        }

        .refresh-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 8px 20px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .refresh-btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px var(--primary);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-box {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 4px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .stat-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary);
            font-family: 'Orbitron', sans-serif;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--glass);
            border: 1px solid var(--border);
        }

        th {
            background: rgba(0, 255, 255, 0.1);
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid var(--primary);
            color: var(--primary);
            text-transform: uppercase;
            font-size: 14px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
        }

        tr:hover {
            background: rgba(0, 255, 255, 0.05);
        }

        .path-link {
            color: #fff;
            text-decoration: none;
        }

        .path-link:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        .badge {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid var(--primary);
            padding: 2px 8px;
            font-size: 10px;
            border-radius: 10px;
        }

        .loader {
            text-align: center;
            padding: 50px;
            font-size: 20px;
            color: var(--primary);
        }

        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="container">
        <header>
            <h1><i class="fa-solid fa-chart-line"></i> SITE_ANALYTICS.EXE</h1>
            <button class="refresh-btn" onclick="loadStats()">REFRESH DATA</button>
        </header>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">Total Page Views</div>
                <div class="stat-value" id="total-views">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Unique Pages</div>
                <div class="stat-value" id="unique-pages">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Top Performer</div>
                <div class="stat-value" id="top-page" style="font-size: 14px;">NONE</div>
            </div>
        </div>

        <div id="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Page Path</th>
                        <th>Visit Count</th>
                        <th>Last Accessed</th>
                    </tr>
                </thead>
                <tbody id="stats-body">
                    <!-- Data will load here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadStats() {
            const tbody = document.getElementById('stats-body');
            tbody.innerHTML = '<tr><td colspan="3" class="loader">DECRYPTING_DATA...</td></tr>';

            try {
                const res = await fetch('/api/stats?t=' + Date.now());
                const data = await res.json();

                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="loader">NO DATA ARCHIVES FOUND.</td></tr>';
                    return;
                }

                let total = 0;
                let topCount = 0;
                let topPath = '';

                tbody.innerHTML = data.map(item => {
                    total += item.visit_count;
                    if (item.visit_count > topCount) {
                        topCount = item.visit_count;
                        topPath = item.page_path;
                    }

                    const date = new Date(item.last_visited_at).toLocaleString('vi-VN');
                    return `
                        <tr>
                            <td><a href="${item.page_path}" class="path-link" target="_blank">${item.page_path}</a></td>
                            <td><span class="badge">${item.visit_count.toLocaleString()} VIEWS</span></td>
                            <td style="opacity: 0.7;">${date}</td>
                        </tr>
                    `;
                }).join('');

                document.getElementById('total-views').textContent = total.toLocaleString();
                document.getElementById('unique-pages').textContent = data.length;
                document.getElementById('top-page').textContent = topPath.toUpperCase();

            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="3" class="loader" style="color: #ff3366;">ACCESS_DENIED: SYSTEM ERROR</td></tr>';
            }
        }

        loadStats();
    </script>
</body>
</html>
