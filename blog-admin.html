<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Admin - Silverhand</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffff;
            --primary-glow: rgba(0, 255, 255, 0.4);
            --bg: #050a14;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --danger: #ff4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Particles Background */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.3;
        }

        header {
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary-glow);
        }

        .btn {
            background: var(--card-bg);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 0.8rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: var(--primary);
            color: var(--bg);
            box-shadow: 0 0 20px var(--primary-glow);
            transform: translateY(-2px);
        }

        .btn.danger {
            border-color: var(--danger);
            color: var(--danger);
        }

        .btn.danger:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.4);
        }

        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .post-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .post-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .post-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .post-thumb {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid var(--border);
            background: #111;
        }

        .post-content {
            padding: 1.5rem;
            flex-grow: 1;
        }

        .post-category {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: block;
        }

        .post-title {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .post-desc {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 0.75rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.5;
        }

        .read-more-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.72rem;
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            background: transparent;
            border: 1px solid rgba(0, 255, 255, 0.35);
            padding: 0.3rem 0.75rem;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.5px;
            margin-bottom: 0.75rem;
        }
        .read-more-btn:hover {
            background: rgba(0, 255, 255, 0.12);
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }

        /* Read Post Modal */
        #read-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1100;
            padding: 1.5rem;
        }
        #read-modal-overlay.active { display: flex; }

        .read-modal {
            background: #080f1c;
            border: 1px solid var(--primary);
            border-radius: 14px;
            width: 100%;
            max-width: 780px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 60px rgba(0, 255, 255, 0.12), 0 20px 60px rgba(0,0,0,0.7);
            animation: readModalIn 0.25s ease;
        }
        @keyframes readModalIn {
            from { opacity: 0; transform: translateY(20px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .read-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 1.5rem 1.75rem 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            flex-shrink: 0;
        }
        .read-modal-header-left {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .read-modal-category {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 2px;
        }
        .read-modal-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.35;
        }
        .read-modal-close {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.6);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
            margin-left: 1rem;
            margin-top: 0.2rem;
        }
        .read-modal-close:hover {
            background: rgba(255,68,68,0.2);
            border-color: #ff4444;
            color: #ff4444;
        }

        .read-modal-thumb {
            width: 100%;
            max-height: 240px;
            object-fit: cover;
            flex-shrink: 0;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .read-modal-thumb[src=""],
        .read-modal-thumb:not([src]) { display: none; }

        .read-modal-body {
            overflow-y: auto;
            padding: 1.75rem;
            flex-grow: 1;
            scrollbar-width: thin;
            scrollbar-color: rgba(0,255,255,0.3) transparent;
        }
        .read-modal-body::-webkit-scrollbar { width: 5px; }
        .read-modal-body::-webkit-scrollbar-track { background: transparent; }
        .read-modal-body::-webkit-scrollbar-thumb { background: rgba(0,255,255,0.3); border-radius: 10px; }

        /* Rich text content rendering */
        .read-modal-body .rich-content {
            font-size: 0.95rem;
            line-height: 1.8;
            color: rgba(255,255,255,0.85);
        }
        .read-modal-body .rich-content h1,
        .read-modal-body .rich-content h2,
        .read-modal-body .rich-content h3 {
            color: #fff;
            margin: 1.2em 0 0.5em;
            font-weight: 700;
        }
        .read-modal-body .rich-content h1 { font-size: 1.5rem; }
        .read-modal-body .rich-content h2 { font-size: 1.25rem; }
        .read-modal-body .rich-content h3 { font-size: 1.1rem; color: var(--primary); }
        .read-modal-body .rich-content p { margin-bottom: 1em; }
        .read-modal-body .rich-content img {
            max-width: 100%;
            border-radius: 6px;
            border: 1px solid rgba(0,255,255,0.25);
            margin: 0.75em 0;
        }
        .read-modal-body .rich-content a {
            color: var(--primary);
            text-decoration: underline;
        }
        .read-modal-body .rich-content ul,
        .read-modal-body .rich-content ol {
            padding-left: 1.5em;
            margin-bottom: 1em;
        }
        .read-modal-body .rich-content li { margin-bottom: 0.35em; }
        .read-modal-body .rich-content blockquote {
            border-left: 3px solid var(--primary);
            padding-left: 1em;
            margin: 1em 0;
            color: rgba(255,255,255,0.6);
            font-style: italic;
        }
        .read-modal-body .rich-content pre,
        .read-modal-body .rich-content code {
            background: rgba(255,255,255,0.06);
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.88em;
        }
        .read-modal-body .rich-content pre { padding: 1em; margin: 0.75em 0; overflow-x: auto; }
        .read-modal-body .rich-content code { padding: 0.15em 0.4em; }

        .post-actions {
            display: flex;
            gap: 1rem;
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            background: rgba(0,0,0,0.2);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: #0a1120;
            border: 1px solid var(--primary);
            width: 90%;
            max-width: 600px;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.1);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .modal-title {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        input, select, textarea {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: white;
            padding: 0.8rem;
            border-radius: 4px;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255,255,255,0.1);
        }

        .image-preview {
            width: 100%;
            height: 200px;
            background: #111;
            border: 2px dashed var(--border);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 0.5rem;
            overflow: hidden;
            cursor: pointer;
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .loader {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2000;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid var(--card-bg);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Toast Notifications */
        #toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 3000;
        }

        .toast {
            background: #111;
            border-left: 4px solid var(--primary);
            color: white;
            padding: 1rem 2rem;
            margin-top: 1rem;
            border-radius: 4px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease forwards;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 5rem 0;
            color: var(--text-dim);
        }

        /* Quill Customization */
        .ql-toolbar.ql-snow {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border) !important;
        }
        .ql-container.ql-snow {
            border-color: var(--border) !important;
            background: rgba(255, 255, 255, 0.02);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #fff;
            min-height: 250px;
        }
        .ql-snow .ql-stroke { stroke: #fff !important; }
        .ql-snow .ql-fill { fill: #fff !important; }
        .ql-snow .ql-picker { color: #fff !important; }
        .ql-editor.ql-blank::before { color: rgba(255,255,255,0.2) !important; font-style: normal; }
        .ql-editor img { max-width: 100%; border-radius: 4px; border: 1px solid var(--primary); }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <header>
        <h1>SILVERHAND BLOG ADMIN</h1>
        <button class="btn" onclick="openModal()">+ NEW POST</button>
    </header>

    <main>
        <div id="post-list" class="post-grid">
            <!-- Posts will be loaded here -->
            <div class="empty-state">Loading posts...</div>
        </div>
    </main>

    <!-- Modal -->
    <div id="modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title" class="modal-title">NEW POST</h2>
                <button class="btn" style="padding: 0.4rem 0.8rem;" onclick="closeModal()">X</button>
            </div>
            <form id="post-form">
                <input type="hidden" id="post-id">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="post-title" required placeholder="Nhập tiêu đề...">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="post-category">
                        <option value="Update">Update</option>
                        <option value="News">News</option>
                        <option value="Discuss">Discuss</option>
                        <option value="Drama">Drama</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Content (Rich Text Editor)</label>
                    <div id="editor-container"></div>
                </div>
                <div class="form-group">
                    <label>Thumbnail</label>
                    <input type="file" id="post-image" accept="image/*" style="display: none;" onchange="previewImage(event)">
                    <div class="image-preview" onclick="document.getElementById('post-image').click()">
                        <img id="image-preview-img" src="" style="display: none;">
                        <span id="image-placeholder">Click to upload image</span>
                    </div>
                </div>
                <div class="form-group" style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                    <input type="checkbox" id="post-featured" style="width: auto;">
                    <label for="post-featured" style="margin-bottom: 0;">Show on Home Page Slider</label>
                </div>
                <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem;">
                    <button type="button" class="btn danger" onclick="closeModal()">CANCEL</button>
                    <button type="submit" class="btn">SAVE POST</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Read More Modal -->
    <div id="read-modal-overlay">
        <div class="read-modal">
            <div class="read-modal-header">
                <div class="read-modal-header-left">
                    <span class="read-modal-category" id="rm-category"></span>
                    <h2 class="read-modal-title" id="rm-title"></h2>
                </div>
                <button class="read-modal-close" onclick="closeReadModal()">✕</button>
            </div>
            <img class="read-modal-thumb" id="rm-thumb" src="" alt="">
            <div class="read-modal-body" id="rm-body"></div>
        </div>
    </div>

    <div id="loader" class="loader">
        <div class="spinner"></div>
    </div>

    <div id="toast-container"></div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        const API_URL = '/api/blog';
        let posts = [];
        let currentImageBase64 = '';
        let currentImageName = '';

        // Initialize Quill
        const quill = new Quill('#editor-container', {
            theme: 'snow',
            placeholder: 'Write your content here...',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    ['blockquote', 'code-block'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    [{ 'color': [] }, { 'background': [] }],
                    ['link', 'image'],
                    ['clean']
                ]
            }
        });

        // Initialize Background
        function initBg() {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            for (let i = 0; i < 50; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speedX: (Math.random() - 0.5) * 0.5,
                    speedY: (Math.random() - 0.5) * 0.5
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#00ffff';
                particles.forEach(p => {
                    p.x += p.speedX;
                    p.y += p.speedY;
                    if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                    if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        // Fetch Posts
        async function fetchPosts() {
            showLoader(true);
            try {
                const res = await fetch(API_URL + '?t=' + Date.now());
                posts = await res.json();
                renderPosts();
            } catch (err) {
                showToast('Failed to fetch posts', 'danger');
            } finally {
                showLoader(false);
            }
        }

        function renderPosts() {
            const list = document.getElementById('post-list');
            if (posts.length === 0) {
                list.innerHTML = '<div class="empty-state">No posts found. Create your first one!</div>';
                return;
            }

            list.innerHTML = posts.map(post => {
                const plainText = stripHtml(post.description || '');
                const preview = plainText.length > 120 ? plainText.slice(0, 120).trimEnd() + '…' : plainText;
                const hasContent = plainText.trim().length > 0;
                return `
                <div class="post-card">
                    <img src="${post.imageUrl || 'https://via.placeholder.com/400x200?text=No+Image'}" class="post-thumb" alt="${escHtml(post.title)}">
                    <div class="post-content">
                        <span class="post-category">${escHtml(post.category)}</span>
                        <h3 class="post-title">${escHtml(post.title)}</h3>
                        ${preview ? `<p class="post-desc">${escHtml(preview)}</p>` : ''}
                        ${hasContent ? `<button class="read-more-btn" onclick="openReadModal('${post.id}')">📖 READ MORE</button>` : ''}
                        ${post.isFeatured ? '<span style="font-size: 0.6rem; background: var(--primary); color: #000; padding: 2px 6px; border-radius: 2px; font-weight: bold; display: inline-block;">FEATURED ON HOME</span>' : ''}
                    </div>
                    <div class="post-actions">
                        <button class="btn" style="flex: 1;" onclick="editPost('${post.id}')">EDIT</button>
                        <button class="btn danger" style="padding: 0.8rem;" onclick="deletePost('${post.id}')">DEL</button>
                    </div>
                </div>`;
            }).join('');
        }

        // Modal Controls
        function openModal(post = null) {
            document.getElementById('modal').style.display = 'flex';
            const form = document.getElementById('post-form');
            form.reset();
            document.getElementById('post-id').value = '';
            document.getElementById('image-preview-img').style.display = 'none';
            document.getElementById('image-placeholder').style.display = 'block';
            currentImageBase64 = '';
            currentImageName = '';
            document.getElementById('post-featured').checked = false;
            
            if (post) {
                document.getElementById('modal-title').innerText = 'EDIT POST';
                document.getElementById('post-id').value = post.id;
                document.getElementById('post-title').value = post.title;
                document.getElementById('post-category').value = post.category;
                quill.root.innerHTML = post.description || '';
                if (post.imageUrl) {
                    const img = document.getElementById('image-preview-img');
                    img.src = post.imageUrl;
                    img.style.display = 'block';
                    document.getElementById('image-placeholder').style.display = 'none';
                }
                document.getElementById('post-featured').checked = post.isFeatured || false;
            } else {
                document.getElementById('modal-title').innerText = 'NEW POST';
            }
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // Image Preview
        function previewImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            currentImageName = file.name;
            const reader = new FileReader();
            reader.onload = function(e) {
                currentImageBase64 = e.target.result;
                const img = document.getElementById('image-preview-img');
                img.src = currentImageBase64;
                img.style.display = 'block';
                document.getElementById('image-placeholder').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        // Form Submit
        document.getElementById('post-form').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('post-id').value;
            const data = {
                title: document.getElementById('post-title').value,
                category: document.getElementById('post-category').value,
                description: quill.root.innerHTML,
                imageBase64: currentImageBase64,
                imageName: currentImageName,
                isFeatured: document.getElementById('post-featured').checked
            };

            showLoader(true);
            try {
                let res;
                if (id) {
                    res = await fetch(API_URL, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ...data, id })
                    });
                } else {
                    res = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                }

                if (res.ok) {
                    showToast(id ? 'Post updated!' : 'Post created!');
                    closeModal();
                    fetchPosts();
                } else {
                    throw new Error('Server error');
                }
            } catch (err) {
                showToast('Action failed: ' + err.message, 'danger');
            } finally {
                showLoader(false);
            }
        };

        // Helpers
        function stripHtml(html) {
            const tmp = document.createElement('div');
            tmp.innerHTML = html;
            return tmp.textContent || tmp.innerText || '';
        }
        function escHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // Read-More Modal
        window.openReadModal = (id) => {
            const post = posts.find(p => p.id === id);
            if (!post) return;
            document.getElementById('rm-category').textContent = post.category || '';
            document.getElementById('rm-title').textContent = post.title || '';
            const thumb = document.getElementById('rm-thumb');
            if (post.imageUrl) {
                thumb.src = post.imageUrl;
                thumb.style.display = 'block';
            } else {
                thumb.src = '';
                thumb.style.display = 'none';
            }
            document.getElementById('rm-body').innerHTML =
                `<div class="rich-content">${post.description || ''}</div>`;
            document.getElementById('read-modal-overlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        };
        window.closeReadModal = () => {
            document.getElementById('read-modal-overlay').classList.remove('active');
            document.body.style.overflow = '';
        };
        document.getElementById('read-modal-overlay').addEventListener('click', function(e) {
            if (e.target === this) window.closeReadModal();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && document.getElementById('read-modal-overlay').classList.contains('active')) {
                window.closeReadModal();
            }
        });

        // Actions
        window.editPost = (id) => {
            const post = posts.find(p => p.id === id);
            if (post) openModal(post);
        };

        window.deletePost = async (id) => {
            if (!confirm('Are you sure you want to delete this post?')) return;
            
            showLoader(true);
            try {
                const res = await fetch(`${API_URL}?id=${id}`, { method: 'DELETE' });
                if (res.ok) {
                    showToast('Post deleted!');
                    fetchPosts();
                } else {
                    throw new Error('Failed to delete');
                }
            } catch (err) {
                showToast(err.message, 'danger');
            } finally {
                showLoader(false);
            }
        };

        // UI Helpers
        function showLoader(show) {
            document.getElementById('loader').style.display = show ? 'block' : 'none';
        }

        function showToast(msg, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (type === 'danger') toast.style.borderColor = 'var(--danger)';
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Init
        initBg();
        fetchPosts();
    </script>
</body>
</html>
