<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Camp Aegis — SAO-ĐÊM COMMAND</title>
  <meta name="description" content="Quản lý doanh trại thực tế ảo tích hợp thời tiết thực và kinh tế NPC.">
  <link rel="icon" type="image/png" href="assets/img/mayor_avatar.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/loading.css">
  <link rel="stylesheet" href="assets/css/camp_aegis.css">
</head>
<body>

<!-- ============ LOADING SCREEN ============ -->
<div id="loadingOverlay">
  <div class="loading-wrapper">
    <div class="loading-text">
       <span class="sao">CAMP &nbsp;</span><span class="dem"> AEGIS</span>
    </div>
    <div class="loading-progress">
      <div class="progress-bar" id="loadingProgress"></div>
      <div class="loading-info">
        <span id="loadingStatus">SYNCING NEURAL NETWORK...</span>
        <span id="loadingPercentage">0%</span>
      </div>
    </div>
  </div>
</div>

<!-- ============ BACKGROUND & CANVAS ============ -->
<div id="gameBg">
    <div class="grid-overlay"></div>
    <div class="scanline"></div>
</div>

<!-- ============ HUD: TOP STATUS ============ -->
<div id="topHUD">
  <div class="hud-left">
    <div class="camp-name">SAO-ĐÊM // HQ</div>
    <div class="camp-time" id="serverTime">SYSTEM TIME: --:--</div>
  </div>

  <div class="hud-center">
    <!-- WEATHER DISPLAY -->
    <div id="weatherWidget" class="weather-widget">
      <div class="weather-icon" id="w-icon">⏳</div>
      <div class="weather-info">
        <div class="w-top">
          <span id="w-temp">--°C</span>
          <span id="w-desc">FETCHING...</span>
        </div>
        <div class="w-bottom">
          <span id="w-location">Hanoi, VN</span>
        </div>
      </div>
    </div>
  </div>

  <div class="hud-right">
    <div class="resource-item">
      <span class="res-label">CREDITS</span>
      <span class="res-val" id="creditsVal">0</span>
    </div>
    <button class="btn-exit" onclick="window.location.href='drama.html'">✕ EXIT</button>
  </div>
</div>

<!-- ============ MAIN GAME AREA ============ -->
<div id="canvasViewport">
  <!-- The Isometric Grid will be rendered here via Canvas -->
  <canvas id="gameCanvas"></canvas>

  <!-- UI OVERLAYS (Floating) -->
  <div id="plotMenu" class="plot-menu" style="display:none;">
    <div class="menu-header">PLOT #[ID]</div>
    <div class="menu-body" id="plotActions">
       <!-- Dynamic actions based on plot state -->
    </div>
    <button class="menu-close" onclick="closePlotMenu()">X</button>
  </div>
</div>

<!-- ============ BOTTOM NAV / CONTROLS ============ -->
<div id="bottomNav">
  <button class="nav-btn active" data-tab="grid">🗺️ GRID</button>
  <button class="nav-btn" data-tab="market">🏪 MARKET</button>
  <button class="nav-btn" data-tab="members">👥 MEMBERS</button>
  <button class="nav-btn" data-tab="tech">⚙️ TECH</button>
  <button class="nav-btn" data-tab="log">📜 LOG</button>
</div>

<!-- ============ MODALS / OVERLAYS ============ -->
<div id="gameModal" class="modal-overlay" style="display:none;">
  <div class="modal-panel">
      <div class="modal-header">
          <div id="modalTitle">TITLE</div>
          <button onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" id="modalContent">
          <!-- Rendered by JS -->
      </div>
  </div>
</div>

<script src="assets/js/loading.js"></script>
<script src="assets/js/camp_aegis.js"></script>

</body>
</html>
