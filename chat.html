<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Silver-Hand | Neural Chat Node</title>
    
    <!-- Design System Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/chat_gamer.css">
    <link rel="stylesheet" href="assets/css/loading.css">
    <link rel="icon" type="image/png" href="assets/img/mayor_avatar.jpg">
</head>
<body>

<div id="loadingOverlay">
  <div class="loading-bg-layer"></div>
  <div class="loading-scanlines"></div>
  <div class="loading-corner-tl">
    <div class="corner-line">NEURAL CHAT NODE // SAO-ĐÊM</div>
    <div class="corner-line">AI LINK ESTABLISHING</div>
  </div>
  <div class="loading-hud-panel">
    <div class="loading-title-row">
      <div class="loading-logo"><span class="sao">SAO&nbsp;</span><span class="dem">&nbsp;ĐÊM</span></div>
      <div class="loading-label-text">LOADING...</div>
    </div>
    <div class="loading-bar-row">
      <div class="loading-bar-track"><div class="loading-bar-fill" id="loadingBarFill"></div></div>
      <div class="loading-pct" id="loadingPercentage">0%</div>
    </div>
    <div class="loading-status-row">
      <span class="loading-status-text" id="loadingStatus">INITIALIZING...</span>
    </div>
    <div class="loading-tip-row">
      <div class="loading-tip-label">TIP</div>
      <div class="loading-tip-text" id="loadingTipText"></div>
    </div>
  </div>
  <div id="loadingPressAny">PRESS ANY KEY TO CONTINUE</div>
</div>

<div class="chat-container">
    <!-- REFACTORED SIDEBAR -->
    <aside class="chat-sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>NEURAL_CONTROL</h1>
        </div>
        
        <button id="newChatBtn" class="hud-action-btn">INITIALIZE_NEW_LINK</button>
        
        <div class="sidebar-header" style="margin-top: 25px">
            <h1>HISTORY_LOGS</h1>
        </div>
        
        <div class="sidebar-content" id="historyList">
            <!-- Dynamically populated -->
        </div>

        <div class="sidebar-footer" style="margin-top:20px; border-top: 1px solid var(--border-dim); padding-top:15px">
            <button id="clear" class="hud-action-btn wipe-btn">WIPE_OUT_DATA</button>
            <div id="clock" style="font-family:'Orbitron'; font-size:14px; margin-top:10px; color:var(--neon-cyan); text-align:center">00:00:00</div>
        </div>
    </aside>

    <!-- QUICK SUGGESTIONS OVERLAY (HIDDEN BY DEFAULT) -->
    <div class="quick-suggestions" id="quickSuggestions">
        <!-- FAQ items injected here -->
    </div>

    <main class="chat-main">
        <div class="chat-topbar">
            <div class="topbar-left">
                <button id="toggleSidebar" class="menu-trigger-btn">NEURAL_MENU</button>
                <button id="faqTrigger" class="faq-trigger-btn" title="Quick Queries">?</button>
            </div>
            
            <div class="topbar-right">
                <button onclick="window.location.href='index.html'" class="hud-back-btn">EXIT_NODE</button>
            </div>
        </div>
        
        <div class="chat-topbar" style="height:30px; background:transparent; border:none; justify-content:center; opacity:0.4">
             <span style="font-size:9px; letter-spacing:3px">NODE: SILVER_HAND_V4.0</span>
        </div>

        <!-- CHAT MESSAGES PANEL -->
        <div class="messages-area" id="messagesBox">
            <!-- Messages appear here -->
        </div>

        <!-- REFACTORED COMPOSER -->
        <div class="chat-composer">
            <div class="input-wrapper">
                <textarea id="promptInput" rows="1" placeholder="ENTER_NEURAL_COMMAND..."></textarea>
            </div>
            <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 8px;">
                <div class="status-indicator" style="position:static; padding:0; background:transparent">
                    <div class="status-dot"></div>
                    <span id="status" style="font-size: 8px; letter-spacing: 1px; color: var(--neon-cyan); opacity:0.7">ACTIVE</span>
                </div>
                <button id="sendBtn">EXECUTE</button>
            </div>
        </div>
    </main>
</div>

<!-- Scripts -->
<script src="assets/js/hope101_time.js"></script>
<script src="assets/js/chat_handle.js"></script>
<script src="assets/js/loading.js"></script>
<script>
    // Simple side bar toggle
    const sidebar = document.getElementById('sidebar');
    const toggle = document.getElementById('toggleSidebar');
    
    toggle.addEventListener('click', (e) => {
        e.stopPropagation();
        sidebar.classList.toggle('active');
    });
    
    // Close sidebar on click outside
    document.addEventListener('click', (e) => {
        if (!sidebar.contains(e.target) && e.target !== toggle) {
            sidebar.classList.remove('active');
        }
    });

    // Auto-resize textarea
    const textarea = document.getElementById('promptInput');
    textarea.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 150) + 'px';
    });
</script>
</body>
</html>
