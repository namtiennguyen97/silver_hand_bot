<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SAO-ĐÊM: Frontline</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-cyan: #00f2ff;
            --primary-red: #ff3b30;
            --primary-gold: #ffcc00;
            --bg-dark: #0a0a0a;
            --glass-bg: rgba(20, 20, 20, 0.7);
            --glass-border: rgba(0, 242, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated; /* From README */
        }

        /* VIRTUAL CONTROLS */
        .hud-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .stat-panel {
            background: linear-gradient(135deg, rgba(0, 15, 20, 0.95) 0%, rgba(0, 30, 40, 0.85) 100%);
            border: 1px solid rgba(94, 242, 214, 0.4);
            backdrop-filter: blur(10px);
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 15px;
            padding: 12px 18px;
            min-width: 220px;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(94, 242, 214, 0.1);
        }

        .rpg-corner {
            position: absolute;
            width: 12px;
            height: 12px;
            border: 2px solid #5ef2d6;
            pointer-events: none;
        }

        .rpg-corner.top-left {
            top: -2px;
            left: -2px;
            border-right: none;
            border-bottom: none;
        }

        .rpg-corner.bottom-right {
            bottom: -2px;
            right: -2px;
            border-left: none;
            border-top: none;
        }
        
        .stat-bars {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
        }

        .avatar-box {
            width: 50px;
            height: 50px;
            border: 1px solid var(--primary-cyan);
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        .avatar-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent,
                rgba(0, 242, 255, 0.1) 50%,
                transparent
            );
            background-size: 100% 4px;
            pointer-events: none;
            animation: scanlineScroll 2s linear infinite;
        }

        @keyframes scanlineScroll {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .stat-name {
            font-size: 9px;
            color: #fff;
            letter-spacing: 2px;
            margin-bottom: 2px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .avatar-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .level-val {
            font-size: 9px;
            color: var(--primary-cyan);
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            text-shadow: 0 0 5px var(--primary-cyan);
        }

        .stat-label {
            font-size: 9px;
            color: var(--primary-cyan);
            letter-spacing: 2px;
            margin-bottom: 2px;
        }

        /* BARS */
        .bar-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .bar-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            z-index: 2;
        }

        .bar-trail {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background: rgba(255, 255, 255, 0.4);
            z-index: 1;
            transition: width 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .bar-segments {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 19%,
                rgba(0, 0, 0, 0.4) 19%,
                rgba(0, 0, 0, 0.4) 20%
            );
            z-index: 3;
            pointer-events: none;
        }

        /* XP BAR */
        .xp-fill {
            background: var(--primary-gold);
            box-shadow: 0 0 5px var(--primary-gold);
        }

        .bar-container.xp-container {
            height: 3px;
            margin-top: 2px;
        }

        .shield-fill {
            background: var(--primary-cyan);
            box-shadow: 0 0 10px var(--primary-cyan);
        }

        .hp-fill {
            background: var(--primary-red);
            box-shadow: 0 0 10px var(--primary-red);
        }
        
        .stm-fill {
            background: #1eb53a;
            box-shadow: 0 0 5px #1eb53a;
        }

        .bar-container.stm-container {
            height: 4px;
        }

        .hud-bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            width: 100%;
            pointer-events: auto;
        }

        .ctrl-group {
            display: flex;
            gap: 20px;
        }

        .ctrl-btn {
            width: 70px;
            height: 70px;
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--primary-cyan);
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .ctrl-btn:active {
            transform: scale(0.9);
            background: rgba(0, 242, 255, 0.2);
            border-color: var(--primary-cyan);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
        }

        .btn-large {
            width: 85px;
            height: 85px;
            font-size: 32px;
            border-color: var(--primary-pink);
            color: var(--primary-pink);
        }

        .btn-large:active {
            background: rgba(255, 0, 200, 0.2);
            border-color: var(--primary-pink);
            box-shadow: 0 0 30px rgba(255, 0, 200, 0.4);
        }

        .btn-system {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--primary-cyan);
            width: 34px;
            height: 34px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.2s ease;
            pointer-events: auto;
        }

        .btn-system:active {
            transform: scale(0.9);
            border-color: var(--primary-cyan);
        }

        .btn-jump {
            border-color: var(--primary-cyan);
            color: var(--primary-cyan);
        }



        /* MENU OVERLAY */
        #menuOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(15px);
        }

        .menu-content {
            text-align: center;
            font-family: 'Orbitron', sans-serif;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: var(--primary-cyan);
            text-shadow: 0 0 30px var(--primary-cyan);
            letter-spacing: 10px;
        }

        .btn-start {
            background: transparent;
            border: 2px solid var(--primary-cyan);
            color: var(--primary-cyan);
            padding: 15px 40px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 3px;
        }

        .btn-start:hover {
            background: var(--primary-cyan);
            color: #000;
            box-shadow: 0 0 40px var(--primary-cyan);
        }

        /* RESPONSIVE LANDSCAPE WARNING */
        @media screen and (orientation: portrait) {
            #landscapeWarning {
                display: flex !important;
            }
        }

        #landscapeWarning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: var(--primary-gold);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="landscapeWarning">
        <i class="fa-solid fa-rotate" style="font-size: 48px; margin-bottom: 20px;"></i>
        <h2 style="font-family: 'Orbitron';">ROTATE YOUR DEVICE</h2>
        <p style="margin-top: 10px;">Please use Landscape mode for the best experience.</p>
    </div>

    <div id="gameContainer">

        <div class="hud-overlay">
            <div class="hud-top">
                <div class="stat-panel">
                    <div class="rpg-corner top-left"></div>
                    <div class="rpg-corner bottom-right"></div>
                    <div class="avatar-col">
                        <div class="avatar-box">
                            <img src="assets/img/mayor_5.png" alt="Silver-Hand">
                            <div class="avatar-scanline"></div>
                        </div>
                        <div class="level-val" id="levelDisplay">LV.01</div>
                    </div>
                    <div class="stat-bars">
                        <div class="stat-name" id="playerName">Silver-Hand</div>
                        <div class="bar-container">
                            <div class="bar-trail" id="shieldTrail"></div>
                            <div class="bar-fill shield-fill" id="shieldBar"></div>
                            <div class="bar-segments"></div>
                        </div>
                        <div class="bar-container">
                            <div class="bar-trail" id="hpTrail"></div>
                            <div class="bar-fill hp-fill" id="hpBar"></div>
                            <div class="bar-segments"></div>
                        </div>
                        <div class="bar-container stm-container">
                            <div class="bar-fill stm-fill" id="stmBar"></div>
                        </div>
                        <div class="bar-container xp-container">
                            <div class="bar-fill xp-fill" id="xpBar"></div>
                        </div>
                    </div>
                </div>
                <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 10px;">
                    <div class="stat-panel" style="text-align: right; padding: 10px 20px;">
                        <div class="stat-label">AMMO</div>
                        <div class="stat-value" id="ammoText">30/30</div>
                    </div>
                    <div class="btn-system" id="btnFullscreen" onclick="toggleFullscreen()">
                        <i class="fa-solid fa-expand"></i>
                    </div>
                </div>
            </div>

            <div class="hud-bottom">
                <div class="ctrl-group">
                    <div class="ctrl-btn" id="btnLeft"><i class="fa-solid fa-chevron-left"></i></div>
                    <div class="ctrl-btn" id="btnRight"><i class="fa-solid fa-chevron-right"></i></div>
                </div>
                <div class="ctrl-group" style="flex-direction: column-reverse; align-items: flex-end; gap: 15px;">
                    <div style="display: flex; gap: 15px;">
                        <div class="ctrl-btn btn-large" id="btnRoll"><i class="fa-solid fa-person-running"></i></div>
                        <div class="ctrl-btn btn-large" id="btnFire"><i class="fa-solid fa-crosshairs"></i></div>
                    </div>
                    <div class="ctrl-btn btn-large btn-jump" id="btnJump"><i class="fa-solid fa-chevron-up"></i></div>
                </div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="menuOverlay">
            <div class="menu-content">
                <h1>FRONTLINE</h1>
                <p style="margin-bottom: 40px; color: #888; letter-spacing: 2px;">SAO-ĐÊM EXPANSION UNIT</p>
                <button class="btn-start" onclick="startGame()">DEPLOY UNIT</button>
                <p style="margin-top: 20px; font-size: 10px; color: #444;">PC: WASD TO MOVE | K TO FIRE | L TO ROLL | R TO RELOAD | SPACE TO JUMP</p>
                <p style="margin-top: 5px; font-size: 9px; color: #333;">ROLL CONSUMES STAMINA (YELLOW BAR)</p>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        const CONFIG = {
            gravity: 0.6,
            friction: 0.8,
            jumpForce: -12,
            moveSpeed: 5,
            rollSpeed: 10,
            groundY: 0.8,
            playerSize: 50,
            colors: {
                cyan: '#00f2ff',
                pink: '#ff00c8',
                gold: '#ffcc00',
                bg: '#1a1a1a' // Brighter background
            },
            maxAmmo: 30,
            reloadDuration: 90, // frames
            maxStamina: 100,
            staminaRegen: 0.4,
            rollCost: 35,
            enemySpawnRate: 120,
            enemySpeed: 2,
            enemyDamage: 15
        };

        let gameRunning = false;
        let hp = 100;
        let maxHp = 100;
        let shield = 100;
        let maxShield = 100;
        let spawnTimer = 0;
        let invincibilityTimer = 0;
        let xp = 0;
        let level = 1;
        let xpToNext = 100;

        const STATES = {
            RUN: 'RUN',
            IDLE: 'IDLE',
            IDLE_SHOOT: 'IDLE_SHOOT',
            RUN_SHOOT: 'RUN_SHOOT',
            JUMP_SHOOT: 'JUMP_SHOOT',
            JUMP: 'JUMP',
            ROLL: 'ROLL',
            HIT: 'HIT',
            DIE: 'DIE'
        };



        let keys = {};
        let touchControls = {
            left: false,
            right: false,
            jump: false,
            fire: false,
            roll: false
        };

        class Player {
            constructor() {
                this.width = 40; 
                this.height = 60;
                this.x = width / 2 - this.width / 2;
                this.y = height * CONFIG.groundY - this.height;
                this.vx = 0;
                this.vy = 0;
                
                this.isGrounded = false;
                this.isRolling = false;
                this.isDead = false;
                
                this.state = STATES.IDLE;
                this.frameIdx = 0;
                this.animTimer = 0;
                this.animSpeed = 5; // Faster animation speed for responsiveness
                
                this.direction = 1; // 1: right, -1: left
                this.particles = [];
                this.shootTimer = 0;
                this.isShooting = false;

                this.ammo = CONFIG.maxAmmo;
                this.isReloading = false;
                this.reloadTimer = 0;

                this.stamina = CONFIG.maxStamina;
                this.isInvincible = false;
                this.canAirDash = true;
            }

            update() {
                if (this.isDead) {
                    this.state = STATES.DIE;
                    this.vx = 0;
                    this.updateAnimation();
                    return;
                }

                // Update inputs
                this.isShooting = (keys['KeyK'] || touchControls.fire);

                // Default state based on movement and grounded status
                let newState = this.state;
                if (!this.isGrounded) {
                    newState = this.isShooting ? STATES.JUMP_SHOOT : STATES.JUMP;
                } else if (!this.isRolling) {
                    newState = Math.abs(this.vx) > 0.1 ? STATES.RUN : STATES.IDLE;
                    if (this.isShooting) {
                        newState = Math.abs(this.vx) > 0.1 ? STATES.RUN_SHOOT : STATES.IDLE_SHOOT;
                    }
                }

                // Apply input
                if (!this.isRolling) {
                    if (keys['KeyA'] || keys['ArrowLeft'] || touchControls.left) {
                        this.vx = -CONFIG.moveSpeed;
                        this.direction = -1;
                    } else if (keys['KeyD'] || keys['ArrowRight'] || touchControls.right) {
                        this.vx = CONFIG.moveSpeed;
                        this.direction = 1;
                    } else {
                        this.vx *= CONFIG.friction;
                    }

                    if ((keys['Space'] || keys['KeyW'] || keys['ArrowUp'] || touchControls.jump) && this.isGrounded) {
                        this.vy = CONFIG.jumpForce;
                        this.isGrounded = false;
                    }
                }

                // Roll / Air Dash logic
                const canRoll = (keys['KeyL'] || touchControls.roll) && !this.isRolling && this.stamina >= CONFIG.rollCost;
                if (canRoll && (this.isGrounded || this.canAirDash)) {
                    if (!this.isGrounded) {
                        this.canAirDash = false;
                        this.vy = 0; // Freeze vertical movement during air dash
                    }
                    this.isRolling = true;
                    this.stamina -= CONFIG.rollCost;
                    updateHUD();
                    this.state = STATES.ROLL;
                    this.animTimer = 0;
                    this.vx = this.direction * CONFIG.rollSpeed;
                }

                if (this.isRolling) {
                    newState = STATES.ROLL;
                    if (this.animTimer >= 20) { // Roll duration
                        this.isRolling = false;
                    }
                }

                // Shoot logic
                if (this.isShooting && !this.isReloading) {
                    if (this.ammo > 0) {
                        if (this.shootTimer <= 0) {
                            projectiles.push(new Projectile(this.x + this.width/2 + (this.direction * 30), this.y + this.height/2, this.direction));
                            this.shootTimer = 15;
                            this.ammo--;
                            this.createShootEffect();
                            updateHUD();
                        }
                    } else {
                        // Auto reload
                        this.startReload();
                    }
                }
                if (this.shootTimer > 0) this.shootTimer--;

                // Manual reload
                if (keys['KeyR'] && this.ammo < CONFIG.maxAmmo && !this.isReloading) {
                    this.startReload();
                }

                // Reloading logic
                if (this.isReloading) {
                    this.reloadTimer++;
                    if (this.reloadTimer >= CONFIG.reloadDuration) {
                        this.ammo = CONFIG.maxAmmo;
                        this.isReloading = false;
                        this.reloadTimer = 0;
                        updateHUD();
                    }
                }

                // Stamina regen
                if (this.stamina < CONFIG.maxStamina) {
                    this.stamina = Math.min(CONFIG.maxStamina, this.stamina + CONFIG.staminaRegen);
                    updateHUD();
                }

                // Update State & Animation
                if (this.state !== newState) {
                    this.state = newState;
                    this.frameIdx = 0;
                    this.animTimer = 0;
                }
                this.updateAnimation();

                // Physics
                this.vy += CONFIG.gravity;
                this.x += this.vx;
                this.y += this.vy;

                // Ground collision
                const groundY = height * CONFIG.groundY;
                if (this.y + this.height > groundY) {
                    this.y = groundY - this.height;
                    this.vy = 0;
                    this.isGrounded = true;
                    this.canAirDash = true;
                }

                // Wall collision
                if (this.x < 0) this.x = 0;
                if (this.x + this.width > width) this.x = width - this.width;

                // Update particles
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    this.particles[i].update();
                    if (this.particles[i].life <= 0) this.particles.splice(i, 1);
                }
            }

            startReload() {
                if (this.isReloading) return;
                this.isReloading = true;
                this.reloadTimer = 0;
            }

            updateAnimation() {
                this.animTimer++;
            }

            createShootEffect() {
                const effectX = this.x + this.width/2 + (this.direction * 50);
                const effectY = this.y + this.height/2;
                for (let i = 0; i < 5; i++) {
                    this.particles.push(new Particle(effectX, effectY, CONFIG.colors.gold));
                }
            }

            draw() {
                ctx.save();
                
                // Draw Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(this.x + this.width/2, height * CONFIG.groundY, 30, 8, 0, 0, Math.PI * 2);
                ctx.fill();

                // Pure Canvas Character Rendering
                ctx.save();
                ctx.translate(this.x + this.width/2, this.y + this.height/2);
                
                if (this.direction === -1) {
                    ctx.scale(-1, 1);
                }

                // Body
                ctx.strokeStyle = CONFIG.colors.cyan;
                ctx.lineWidth = 2;

                
                if (this.state === STATES.ROLL) {
                    // Draw a rolling circle/ball
                    ctx.rotate(this.animTimer * 0.2);
                    ctx.strokeRect(-this.width/2, -this.height/2, this.width, this.height);
                } else {
                    // Draw a simple humanoid shape
                    // Head
                    ctx.strokeRect(-10, -30, 20, 20);
                    // Body
                    ctx.strokeRect(-15, -10, 30, 40);
                    
                    // Legs (running animation)
                    const legOffset = Math.sin(this.animTimer * 0.2) * 10;
                    if (this.state === STATES.RUN || this.state === STATES.RUN_SHOOT) {
                        ctx.beginPath();
                        ctx.moveTo(-10, 30); ctx.lineTo(-10 + legOffset, 45);
                        ctx.moveTo(10, 30); ctx.lineTo(10 - legOffset, 45);
                        ctx.stroke();
                    } else {
                        ctx.beginPath();
                        ctx.moveTo(-10, 30); ctx.lineTo(-10, 45);
                        ctx.moveTo(10, 30); ctx.lineTo(10, 45);
                        ctx.stroke();
                    }

                    // Arm/Weapon
                    if (this.isShooting) {
                        ctx.strokeStyle = CONFIG.colors.gold;
                        ctx.shadowColor = CONFIG.colors.gold;
                        ctx.beginPath();
                        ctx.moveTo(10, 0); ctx.lineTo(30, 0);
                        ctx.stroke();
                    }
                }

                ctx.restore();
                ctx.restore();

                // Draw Reload Progress Bar (Vertical)
                if (this.isReloading) {
                    const barW = 4;
                    const barH = 50;
                    const barX = this.x - 15;
                    const barY = this.y + this.height/2 - barH/2;
                    const progress = this.reloadTimer / CONFIG.reloadDuration;

                    // Background
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                    ctx.fillRect(barX, barY, barW, barH);

                    // Fill (Vertical bottom-up)
                    ctx.fillStyle = CONFIG.colors.gold;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = CONFIG.colors.gold;
                    ctx.fillRect(barX, barY + barH, barW, -barH * progress);
                    ctx.shadowBlur = 0;
                }

                // Draw particles
                this.particles.forEach(p => p.draw());

                if (invincibilityTimer > 0 && Math.floor(invincibilityTimer / 5) % 2 === 0) {
                    // Flash effect
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                }
            }
        }

        class Enemy {
            constructor(side) {
                this.width = 40;
                this.height = 60;
                this.x = side === 'left' ? -50 : width + 50;
                this.y = height * CONFIG.groundY - this.height;
                this.vx = side === 'left' ? CONFIG.enemySpeed : -CONFIG.enemySpeed;
                this.hp = 30;
                this.isDead = false;
                this.animTimer = Math.random() * 100;
            }

            update() {
                this.x += this.vx;
                this.animTimer++;
                
                // Keep on ground
                this.y = height * CONFIG.groundY - this.height;

                if (this.hp <= 0) this.isDead = true;
                
                // Remove if far off screen
                if (this.x < -200 || this.x > width + 200) this.isDead = true;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + this.width/2, this.y + this.height/2);
                if (this.vx > 0) ctx.scale(-1, 1);

                // Zombie Body (Greenish)
                ctx.strokeStyle = '#39ff14'; // Neon Green
                ctx.lineWidth = 2;


                // Head
                ctx.strokeRect(-10, -30, 20, 20);
                // Body
                ctx.strokeRect(-15, -10, 30, 40);
                
                // Legs
                const legOffset = Math.sin(this.animTimer * 0.15) * 8;
                ctx.beginPath();
                ctx.moveTo(-10, 30); ctx.lineTo(-10 + legOffset, 45);
                ctx.moveTo(10, 30); ctx.lineTo(10 - legOffset, 45);
                ctx.stroke();

                // Arms (Zombie pose)
                ctx.beginPath();
                ctx.moveTo(10, -10); ctx.lineTo(25, -15);
                ctx.moveTo(10, 5); ctx.lineTo(25, 0);
                ctx.stroke();

                ctx.restore();

                // Draw HP Bar (Always left-to-right)
                const barW = 30;
                const barH = 4;
                const barX = this.x + this.width/2 - barW/2;
                const barY = this.y - 10;
                
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(barX, barY, barW, barH);
                ctx.fillStyle = '#ff3b30';
                ctx.fillRect(barX, barY, barW * (Math.max(0, this.hp) / 30), barH);
            }
        }

        class Projectile {
            constructor(x, y, dir) {
                this.x = x;
                this.y = y;
                this.vx = dir * 15;
                this.width = 15;
                this.height = 4;
                this.active = true;
            }

            update() {
                this.x += this.vx;
                if (this.x < 0 || this.x > width) this.active = false;
            }

            draw() {
                ctx.fillStyle = CONFIG.colors.gold;

                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.shadowBlur = 0;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.color = color;
                this.life = 1.0;
                this.decay = Math.random() * 0.05 + 0.02;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }

            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, 3, 3);
                ctx.globalAlpha = 1.0;
            }
        }

        let player;
        let projectiles = [];
        let enemies = [];

        function takeDamage(amount) {
            if (invincibilityTimer > 0) return;
            
            if (shield > 0) {
                shield -= amount;
                if (shield < 0) {
                    hp += shield; // subtract overflow from hp
                    shield = 0;
                }
            } else {
                hp -= amount;
            }

            if (hp <= 0) {
                hp = 0;
                player.isDead = true;
                // Game over logic would go here
            }

            invincibilityTimer = 60; // 1 second of invincibility
            updateHUD();
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            if (player) player.y = height * CONFIG.groundY - player.height;
        }

        function drawBackground() {
            /* Removed grid background as requested */

            // Ground line
            const groundY = height * CONFIG.groundY;
            ctx.strokeStyle = CONFIG.colors.cyan;
            ctx.lineWidth = 2;

            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(width, groundY);
            ctx.stroke();
            ctx.shadowBlur = 0;

            // Simple parallax buildings (silhouettes)
            ctx.fillStyle = 'rgba(255, 255, 255, 0.02)';
            for (let i = 0; i < 5; i++) {
                ctx.fillRect(i * 300, groundY - 200, 150, 200);
            }
        }

        function startGame() {
            document.getElementById('menuOverlay').style.display = 'none';
            
            // Request Fullscreen on start
            requestFullscreen();

            player = new Player();
            projectiles = [];
            enemies = [];
            
            hp = 100;
            shield = 100;
            spawnTimer = 0;
            invincibilityTimer = 0;
            updateHUD();

            gameRunning = true;
        }

        function gainXP(amount) {
            xp += amount;
            if (xp >= xpToNext) {
                xp -= xpToNext;
                level++;
                xpToNext = Math.floor(xpToNext * 1.5);
                // Visual level up effect could go here
                createLevelUpEffect();
            }
            updateHUD();
        }

        function createLevelUpEffect() {
            for(let i=0; i<20; i++) {
                player.particles.push(new Particle(player.x + player.width/2, player.y, '#bc13fe'));
            }
        }

        let lastHUDState = {};

        function updateHUD() {
            if (!player) return;
            
            const currentState = {
                hp, shield, stamina: Math.floor(player.stamina), ammo: player.ammo, level
            };
            
            // Only update DOM if state actually changed (primitive optimization)
            if (JSON.stringify(currentState) === JSON.stringify(lastHUDState)) return;
            lastHUDState = currentState;

            const shieldPct = (shield / maxShield * 100) + '%';
            const hpPct = (hp / maxHp * 100) + '%';
            
            document.getElementById('shieldBar').style.width = shieldPct;
            document.getElementById('hpBar').style.width = hpPct;
            
            setTimeout(() => {
                const sTrail = document.getElementById('shieldTrail');
                const hTrail = document.getElementById('hpTrail');
                if(sTrail) sTrail.style.width = shieldPct;
                if(hTrail) hTrail.style.width = hpPct;
            }, 100);

            document.getElementById('stmBar').style.width = (player.stamina / CONFIG.maxStamina * 100) + '%';
            document.getElementById('ammoText').innerText = `${player.ammo}/${CONFIG.maxAmmo}`;
            document.getElementById('levelDisplay').innerText = `LV.${level.toString().padStart(2, '0')}`;
        }

        function update() {
            if (!gameRunning) return;
            player.update();
            
            if (invincibilityTimer > 0) invincibilityTimer--;

            // Enemy Spawning
            spawnTimer++;
            if (spawnTimer >= CONFIG.enemySpawnRate) {
                const side = Math.random() > 0.5 ? 'left' : 'right';
                enemies.push(new Enemy(side));
                spawnTimer = 0;
            }

            // Update Enemies
            enemies.forEach((e, eIdx) => {
                e.update();
                
                // Collision with Player
                if (!player.isDead && !player.isRolling &&
                    e.x < player.x + player.width &&
                    e.x + e.width > player.x &&
                    e.y < player.y + player.height &&
                    e.y + e.height > player.y) {
                    takeDamage(CONFIG.enemyDamage);
                }

                if (e.isDead) enemies.splice(eIdx, 1);
            });

            // Update Projectiles
            projectiles.forEach((p, pIdx) => {
                p.update();
                
                // Collision with Enemies
                enemies.forEach((e) => {
                    if (!e.isDead &&
                        p.x < e.x + e.width &&
                        p.x + p.width > e.x &&
                        p.y < e.y + e.height &&
                        p.y + p.height > e.y) {
                        e.hp -= 15;
                        if (e.hp <= 0) gainXP(20);
                        p.active = false;
                        // Create hit particles
                        for(let i=0; i<3; i++) player.particles.push(new Particle(p.x, p.y, '#39ff14'));
                    }
                });

                if (!p.active) projectiles.splice(pIdx, 1);
            });
        }

        function draw() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, width, height);

            drawBackground();
            
            if (gameRunning) {
                projectiles.forEach(p => p.draw());
                enemies.forEach(e => e.draw());
                player.draw();
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // EVENT LISTENERS
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // Touch Control Listeners
        const setupBtn = (id, control) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                touchControls[control] = true;
            });
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                touchControls[control] = false;
            });
            // Also support mouse for testing HUD on PC
            btn.addEventListener('mousedown', () => touchControls[control] = true);
            btn.addEventListener('mouseup', () => touchControls[control] = false);
            btn.addEventListener('mouseleave', () => touchControls[control] = false);
        };

        setupBtn('btnLeft', 'left');
        setupBtn('btnRight', 'right');
        setupBtn('btnJump', 'jump');
        setupBtn('btnFire', 'fire');
        setupBtn('btnRoll', 'roll');

        function requestFullscreen() {
            const el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            else if (el.msRequestFullscreen) el.msRequestFullscreen();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                requestFullscreen();
                document.getElementById('btnFullscreen').innerHTML = '<i class="fa-solid fa-compress"></i>';
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                document.getElementById('btnFullscreen').innerHTML = '<i class="fa-solid fa-expand"></i>';
            }
        }

        window.addEventListener('resize', resize);
        resize();
        requestAnimationFrame(loop);
    </script>
</body>
</html>
