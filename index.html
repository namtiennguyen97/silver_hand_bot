<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>SAO-ĐÊM – Mayor AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS dùng lại -->
  <link rel="stylesheet" href="assets/css/modal_faq.css">
  <link rel="stylesheet" href="assets/css/main_clone_mobile.css">
  <link rel="stylesheet" href="assets/css/loading.css">
  <link rel="icon" type="image/png" href="assets/img/mayor_avatar.jpg">
  <link rel="stylesheet" href="assets/css/heartlock_zone_info.css">
  <link rel="stylesheet" href="assets/css/cert_info.css">
  <link rel="stylesheet" href="assets/css/mobile_index.css">
  <link rel="stylesheet" href="assets/css/about_me.css">
  <link rel="stylesheet" href="assets/css/rpg_chat.css">
  <link rel="stylesheet" href="assets/css/news.css">
  <link rel="stylesheet" href="assets/css/index_hud.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>
<!-- CYBER LIST OVERLAY (LEGACY) -->
<div id="cyberOverlay" class="cyber-overlay">
</div>

<!-- =============================================
     GAMING HUD - NEW OVERLAY
============================================= -->
<div id="hud-root">
  <!-- TOP ROW: Profile & Resources -->
    <div class="hud-top-row">
        <!-- TOP LEFT: Profile -->
        <div class="hud-section">
            <div class="hud-profile" id="hudProfile">
                <div class="hud-level-wrap">
                    <div class="hud-level-circle">
                        <span class="hud-level-val">146</span>
                        <span class="hud-level-label">LEVEL</span>
                    </div>
                    <div class="level-ring-rotate"></div>
                </div>
                <div class="hud-profile-info">
                    <div class="hud-profile-name">Silver Hand</div>
                    <div class="hud-exp-bar-wrap">
                        <div class="hud-exp-bar-fill" style="width: 75%"></div>
                        <div class="hud-exp-val">EXP 75%</div>
                    </div>

                    <div class="hud-profile-id">ID: 30197479</div>
                </div>
            </div>
        </div>

        <!-- TOP CENTER: Removed time sync per request -->
        <!-- TOP RIGHT: Resources -->
        <div class="hud-section">
            <div class="hud-resources">
                <div class="hud-resource-item">
                    <div class="hud-res-icon"></div>
                    <div class="hud-res-val">2,674,938</div>
                </div>
                <div class="hud-resource-item">
                    <div class="hud-res-icon" style="background:var(--hud-pink)"></div>
                    <div class="hud-res-val">SYNC: 100%</div>
                </div>
            </div>
        </div>
    </div>

    <!-- MIDDLE ROW: Action Menu -->
    <div class="hud-mid-row">
        <div class="hud-action-menu">
            <button class="hud-action-btn btn-battle" id="hudBtnBattle">
                <span class="btn-main-label">BATTLE</span>
                <span class="btn-sub-label">// DRAMA_ARCHIVE.EXE</span>
            </button>
            <button class="hud-action-btn" id="hudBtnMembers">
                <span class="btn-main-label">NEWS</span>
                <span class="btn-sub-label">OFFICIAL_BROADCAST_SYNC</span>
            </button>
            <button class="hud-action-btn" id="hudBtnTasks">
                <span class="btn-main-label">TASKS</span>
                <span class="btn-sub-label">DAILY_OBJECTIVE_SYNC</span>
            </button>
            <button class="hud-action-btn" id="hudBtnRD">
                <span class="btn-main-label">CTC PLAN</span>
                <span class="btn-sub-label">CTC_PLANER_ACCESS</span>
            </button>
            <button class="hud-action-btn" id="hudBtnSetting">
                <span class="btn-main-label">SETTING</span>
                <span class="btn-sub-label">SYSTEM_PREFERENCES</span>
            </button>
        </div>
    </div>

    <!-- BOTTOM ROW: Utilities & Status -->
    <div class="hud-bottom-row">
        <!-- BOTTOM LEFT: Utility & Promo -->
        <div class="hud-bottom-left">
            <div class="hud-utility-icons">
                <div class="hud-util-btn" id="hudBtnNotice" title="Notice">
                    <i class="fa-solid fa-bullhorn"></i>
                </div>
                <div class="hud-util-btn" id="hudBtnMail" title="Mail">
                    <i class="fa-solid fa-envelope"></i>
                    <div class="hud-cyan-glow" style="position:absolute; top:-2px; right:-2px; width:8px; height:8px; background:var(--hud-cyan); border-radius:50%"></div>
                </div>
                <div class="hud-util-btn" id="hudBtnActivities" title="Activities">
                    <i class="fa-solid fa-calendar-check"></i>
                </div>
                <div class="hud-util-btn" id="hudBtnGuide" title="Guide">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
            </div>
            <div class="hud-promo-banner" id="hudPromoBanner">
                <div class="banner-tag">OFFICIAL_BROADCAST</div>
                <img src="assets/img/drama/smirk.png" alt="Promo" style="object-position: top center;">
            </div>
        </div>

        <!-- BOTTOM RIGHT: System Status -->
        <div class="hud-section">
            <div class="hud-system-status">
                <div class="hud-battery-wrap">
                    <span id="hudBatteryVal">...%</span>
                    <div class="battery-icon-outer">
                        <div class="battery-level-bar" id="hudBatteryBar"></div>
                    </div>
                </div>
                <div class="hud-time-val" id="hudTimeBottom">00:00:00</div>
                <div style="font-family: var(--hud-font); font-size: 8px; color: var(--hud-cyan); opacity: 0.8; letter-spacing: 1px; margin-top: -5px;">HOPE 101 TIME</div>
            </div>
        </div>
    </div>
</div>


<div id="stage">
	<div id="ambient"></div>
	
	<!-- Video nền duy nhất (Đã tối ưu) -->
	<video
		id="videoMain"
		class="bg-video active"
		src="assets/videos/mobile_workspace_mayor.mp4"
		autoplay
		muted
		loop
		playsinline
		preload="auto"
		style="will-change: opacity"
	></video>
	
	<div id="videoTransitionMask"></div>
</div>

<!-- Overlay chat, ẩn mặc định -->
<div id="rpgChatOverlay">
	<div class="rpg-chat-box">
		<!-- HUD Corner decorations -->
		<div class="rpg-corner top-left"></div>
		<div class="rpg-corner bottom-right"></div>
		
		<div class="rpg-speaker-tag" id="rpgSpeakerName">Silver-Hand</div>
		
		<div class="rpg-avatar">
			<img src="assets/img/mayor_5.png" alt="Avatar">
			<div class="avatar-scanline"></div>
		</div>
		
		<div class="rpg-chat-content-wrapper">
			<div class="rpg-chat-content" id="rpgChatContent">
				<!-- Text sẽ render từng chữ bằng JS -->
			</div>
			<div class="rpg-next-indicator" id="rpgNextIndicator">▼</div>
		</div>
	</div>
</div>

<div id="loadingOverlay">
  <div class="loading-wrapper">
    <div class="loading-text">
      <span class="sao">SAO &nbsp;</span><span class="dem"> ĐÊM</span>
    </div>

    <div class="loading-progress">
      <div class="progress-bar" id="loadingProgress"></div>
      <div class="loading-info">
        <span id="loadingStatus">INITIALIZING...</span>
        <span id="loadingPercentage">0%</span>
      </div>
    </div>

    <div class="line top"></div>
    <div class="line bottom"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="infoModal">
  <div class="modal-content ai-modal-content">
    <div class="hud-br-corner"></div>
    <h2 id="modalTitle"></h2>
    <div class="ai-training-box">
      <div class="ai-content" id="modalContent"></div>
    </div>
    <button id="closeModal" class="close-btn">Close</button>
  </div>
</div>


<!-- ================== MODAL TEMPLATES ================== -->

<template id="tpl-setting">
    <div class="setting-container">
        <div class="setting-row">
            <span class="setting-label">BACKGROUND MUSIC (BGM)</span>
            <input type="range" id="bgmSlider" class="cyber-slider" min="0" max="100" value="40">
            <span id="bgmValue" class="setting-val">40%</span>
        </div>
        <div class="setting-row">
            <span class="setting-label">SYSTEM EFFECTS (SFX)</span>
            <input type="range" id="sfxSlider" class="cyber-slider" min="0" max="100" value="60">
            <span id="sfxValue" class="setting-val">60%</span>
        </div>
    </div>
</template>

<template id="tpl-infoA">
  <div class="event-schedule">
    <div class="event-note">
      <span class="event-note-icon">⚠</span>
      <span>Đây là giờ <b>Việt Nam</b>, không phải giờ In-game</span>
    </div>
    <div class="event-list">
      <div class="event-row">
        <div class="event-row-icon">📦</div>
        <div class="event-row-body">
          <div class="event-row-label">Resource Scramble</div>
          <div class="event-row-desc">Nhặt hòm tiếp tế</div>
        </div>
        <div class="event-row-time">
          <span class="event-day">T.2</span>
          <span class="event-hour">19:00 – 20:30</span>
        </div>
      </div>
      <div class="event-row">
        <div class="event-row-icon">🛡️</div>
        <div class="event-row-body">
          <div class="event-row-label">Patrol</div>
          <div class="event-row-desc">Tuần tra hàng ngày</div>
        </div>
        <div class="event-row-time">
          <span class="event-day">Hằng ngày</span>
          <span class="event-hour">19:00</span>
        </div>
      </div>
      <div class="event-row">
        <div class="event-row-icon">⚔️</div>
        <div class="event-row-body">
          <div class="event-row-label">Camp Invasion</div>
          <div class="event-row-desc">Def camp – phòng thủ căn cứ</div>
        </div>
        <div class="event-row-time">
          <span class="event-day">T.3</span>
          <span class="event-hour">21:30</span>
        </div>
      </div>
      <div class="event-row">
        <div class="event-row-icon">💀</div>
        <div class="event-row-body">
          <div class="event-row-label">Boss Camp</div>
          <div class="event-row-desc">Raid boss camp lớn</div>
        </div>
        <div class="event-row-time">
          <span class="event-day">T.5</span>
          <span class="event-hour">22:00</span>
        </div>
      </div>
    </div>
  </div>
</template>

<template id="tpl-infoB">
  <div class="ai-section">
    <p class="ai-paragraph">
      📌 <b>Sau bản update ngày <span class="highlight">31/12/2025</span></b>, hệ thống
      <b>Cert</b> trong LifeAfter đã được <b>chia rõ rệt</b> và có nhiều cải tiến mới.
    </p>
    <p class="ai-paragraph">
      Ngoài <b>Cert chính</b>, người chơi giờ đây có thể chọn thêm
      <b class="neon-text">Cert Part-time (Cert phụ)</b>.
    </p>
    <div class="ai-warning">
      ⚠️ <b>Lưu ý quan trọng:</b><br>
      Cert phụ <u>không mở toàn bộ kỹ năng</u> của nghề đó.
      Hệ thống chỉ cho phép chọn <b>một số skill cố định</b>.
      <br><br>
      👉 Ví dụ: Không thể vừa chơi nghề súng, vừa chế tạo giáp – súng như nghề chế.
    </div>
    <h3 class="ai-title">⚔️ Nghề cơ bản</h3>
    <img src="assets/img/guide/cert/basic_skill.png" class="ai-img" alt="Basic Cert Skill">
    <img src="assets/img/guide/cert/skill_path.png" class="ai-img" alt="Cert Skill Path">
    <h3 class="ai-title">🧩 Nghề phụ (Cert Part-time)</h3>
    <img src="assets/img/guide/cert/additional_skill.png" class="ai-img" alt="Additional Cert Skill">
  </div>
</template>

<template id="tpl-infoC">
  <div class="ai-content">
    <div class="map-block">
      <div class="map-title">SILENT PLAIN</div>
      <div class="code-list">
        <span class="code-chip">006</span>
        <span class="code-chip">1205</span>
        <span class="code-chip">3326</span>
        <span class="code-chip">8254</span>
      </div>
    </div>
    <div class="map-block">
      <div class="map-title">MOUNT GRAY BEAR</div>
      <div class="code-list">
        <span class="code-chip">96</span>
        <span class="code-chip">222</span>
        <span class="code-chip">333</span>
        <span class="code-chip">451</span>
        <span class="code-chip">777</span>
      </div>
    </div>
  </div>
</template>

<template id="tpl-aboutMe">
  <div class="bio-container">
    <div class="bio-header">
      <div class="bio-avatar-wrapper" style="cursor:pointer" id="bioAvatarTrigger">
        <div class="bio-avatar-clip">
            <img src="assets/img/mayor_profile.gif" alt="Avatar">
            <div class="bio-avatar-scan"></div>
        </div>
      </div>
      <div class="bio-main-info">
        <div class="bio-name">Silver-Hand</div>
        <div class="bio-title">Game ID: 30197479</div>
        
        <div class="bio-stats-grid">
            <div class="bio-stat-item">
                <div class="bio-stat-label">Gender</div>
                <div class="bio-stat-value">Male</div>
            </div>
            <div class="bio-stat-item">
                <div class="bio-stat-label">Birth Date</div>
                <div class="bio-stat-value">10-10-1997</div>
            </div>
            <div class="bio-stat-item">
                <div class="bio-stat-label">Join Date</div>
                <div class="bio-stat-value">15-03-2023</div>
            </div>
            <div class="bio-stat-item">
                <div class="bio-stat-label">Server</div>
                <div class="bio-stat-value">Labyrinth</div>
            </div>
            <div class="bio-stat-item">
                <div class="bio-stat-label">Camp</div>
                <div class="bio-stat-value">SAO-ĐÊM</div>
            </div>
            <div class="bio-stat-item">
                <div class="bio-stat-label">Position</div>
                <div class="bio-stat-value">Mayor</div>
            </div>
      
        </div>
      </div>
    </div>

    <div class="bio-section">
      <div class="bio-section-title">
        <span>Mission Statement</span>
        <span style="opacity:0.4; font-size:9px">ACCESSED: 2026.03.26</span>
      </div>
      <div class="bio-text">
        Vốn dĩ không phải là người chơi giỏi trong những tựa game bắn súng, tuy nhiên vẫn gắn bó vì nhiều lý do khác nhau. Quan điểm trong việc tranh chấp đó là nhẫn nhịn. Lợi ích camp luôn được đặt lên hàng đầu.
      </div>
    </div>

    <div class="bio-section">
      <div class="bio-section-title">
        <span>History Chronicle</span>
        <span style="opacity:0.4; font-size:9px">ARCHIVE_01: STATUS_CORE</span>
      </div>
      
      <div class="bio-chronicle">
          <div class="chronicle-item">
              <div class="chronicle-date">15-03-2023</div>
              <div class="chronicle-event">Lần đầu đăng nhập game. Thuộc hệ người chơi <b>Chill</b> (Xây nhà & PVE). <i>(Tạo acc trễ 6 tháng so với server)</i>.</div>
          </div>
          <div class="chronicle-item">
              <div class="chronicle-date">17-03-2023</div>
              <div class="chronicle-event">Gia nhập camp <b>SAO-ĐÊM</b> (Member). Chỉ chơi PVE và không quan tâm thế sự.</div>
          </div>
          <div class="chronicle-item">
              <div class="chronicle-date">03-07-2023</div>
              <div class="chronicle-event">Bổ nhiệm làm <b>Official Camp</b>. Tập trung hoạt động nhỏ lẻ, ẩn mình và không dính drama server.</div>
          </div>
          <div class="chronicle-item">
              <div class="chronicle-date">CUỐI NĂM 2023</div>
              <div class="chronicle-event">Lần đầu đạt danh hiệu <b>Golden Knight</b>.</div>
          </div>
          <div class="chronicle-item">
              <div class="chronicle-date">NĂM 2024</div>
              <div class="chronicle-event">Mở rộng quan hệ với dàn Official & Mayor. Bắt đầu hỗ trợ giúp đỡ các thành viên trong camp.</div>
          </div>
          <div class="chronicle-item">
              <div class="chronicle-date">THÁNG 10-2024</div>
              <div class="chronicle-event">Camp chiến thắng <b>Shelter Land</b> đầu tiên và vẻ vang nhất server.</div>
          </div>
          <div class="chronicle-item">
              <div class="chronicle-date">CUỐI THÁNG 12-2024</div>
              <div class="chronicle-event">Chính thức trở thành <b>Mayor (Thị trưởng)</b>. Tập trung phát triển camp. Đạt hạng <b>Diamond Knight</b>.</div>
          </div>
          <div class="chronicle-item">
              <div class="chronicle-date">NĂM 2025</div>
              <div class="chronicle-event">Bắt đầu tham gia đóng góp ý kiến về đồng minh, nhưng vẫn ưu tiên <b>Camp SAO-ĐÊM</b> lên hàng đầu.</div>
          </div>
          <div class="chronicle-item">
              <div class="chronicle-date">THÁNG 08-2025</div>
              <div class="chronicle-event"><b>Mở cửa Quốc tế</b>: Cho phép người nước ngoài gia nhập để chuẩn bị cho Shelter Land.</div>
          </div>
          <div class="chronicle-item">
              <div class="chronicle-date">ĐẦU NĂM 2026</div>
              <div class="chronicle-event">Camp SAO-ĐÊM đạt danh hiệu <b>Shelter Land</b> lần thứ 2.</div>
          </div>
      </div>
    </div>

    <div class="bio-footer">
      SYSTEM_ID: 30197479 | AUTHORIZED BY MAYOR
    </div>
  </div>
</template>

<template id="tpl-news">
    <div class="news-lang-wrapper" id="newsLangWrapper" style="display: none;">
        <select id="newsLangSelect" class="news-lang-select">
            <option value="en">🇺🇸 ENGLISH</option>
            <option value="vi">🇻🇳 VIETNAMESE</option>
        </select>
    </div>
    <div class="news-container" id="newsContainer"></div>
    <div class="news-detail-view" id="newsDetail">
        <button class="news-back-btn" id="newsBackBtn">Back</button>
        <div class="news-detail-body" id="newsDetailBody"></div>
    </div>
</template>

<!-- Bio Gallery Overlay -->
<div class="bio-gallery-overlay" id="bioGallery">
    <div class="gallery-screen">
        <div class="gallery-close" id="closeGallery">Close System</div>
        <div class="gallery-nav prev" id="prevGallery">Prev</div>
        <img src="" class="gallery-image" id="galleryImg">
        <div class="gallery-nav next" id="nextGallery">Next</div>
    </div>
</div>

<script src="assets/js/loading.js"></script>
<script src="assets/js/heartlock_zone_info.js"></script>
<script src="assets/js/rpg_chat.js"></script>
<script src="assets/js/index_main.js"></script>

<audio id="bgmAudio" loop src="assets/sounds/pgr_to_our_destiny.mp3" preload="auto"></audio>

</body>
</html>
