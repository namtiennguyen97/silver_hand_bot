<script>
  /* ===============================
     CONFIG
  ================================ */
  const VIDEO_W   = 1280;
  const VIDEO_H   = 720;
  const CONTENT_W = 475;

  /* ===============================
     ELEMENTS
  ================================ */
  const video        = document.getElementById('video');
  const hotspotLayer = document.getElementById('hotspot-layer');

  /* ===============================
     DEVICE CHECK
  ================================ */
  function isMobile() {
    return window.matchMedia('(max-width: 768px) and (pointer: coarse)').matches;
  }

  /* ===============================
     VIDEO LAYOUT
  ================================ */
	function layoutVideo() {
		const vw = Math.min(window.innerWidth, CONTENT_W);
		const vh = window.innerHeight;
	
		const scaleContent = vw / CONTENT_W;
		const scaleVideo   = vw / VIDEO_W;
		const scale        = Math.max(scaleContent, scaleVideo);
	
		const renderW = VIDEO_W * scale;
		const renderH = VIDEO_H * scale;
	
		video.style.width  = renderW + 'px';
		video.style.height = renderH + 'px';
	
		const contentCenterX = (VIDEO_W / 2) * scale;
	
		const screenCenter = window.innerWidth / 2;
	
		video.style.left = (screenCenter - contentCenterX) + 'px';
		video.style.top  = (vh - renderH) / 2 + 'px';
	}

  /* ===============================
     HOTSPOT ENGINE
  ================================ */
  class HotspotEngine {
    constructor(videoEl, layerEl, videoW, videoH) {
      this.video  = videoEl;
      this.layer  = layerEl;
      this.videoW = videoW;
      this.videoH = videoH;
      this.items  = [];
    }

    collect() {
      this.items = Array.from(this.layer.querySelectorAll('.hotspot'));
    }

    update() {
      if (!this.video || !this.items.length) return;

      const rect = this.video.getBoundingClientRect();

      this.items.forEach(hs => {
        const x = parseFloat(hs.dataset.x);
        const y = parseFloat(hs.dataset.y);

        if (isNaN(x) || isNaN(y)) return;

        const px = rect.left + (x / this.videoW) * rect.width;
        const py = rect.top  + (y / this.videoH) * rect.height;

        hs.style.left = px + 'px';
        hs.style.top  = py + 'px';
      });
    }
  }

  /* ===============================
     INIT
  ================================ */
  const hotspotEngine = new HotspotEngine(
      video,
      hotspotLayer,
      VIDEO_W,
      VIDEO_H
  );

  /* ===============================
     SYNC ALL
  ================================ */
  function syncLayout() {
    layoutVideo();
    hotspotEngine.update();
  }

  /* ===============================
     BOOTSTRAP
  ================================ */
	video.src = '/assets/videos/mobile_workspace_mayor.mp4';
	video.load();

	window.addEventListener('load', () => {
		hotspotEngine.collect();
		syncLayout();
	});

	window.addEventListener('resize', syncLayout);


	
	
	
	
	
	
	
	
	
	
	// đoạn box ho
	const chatOverlay = document.getElementById('rpgChatOverlay');

	// Ẩn chat khi click ra ngoài
	document.addEventListener('click', (e) => {
		const chatOverlay = document.getElementById('rpgChatOverlay');
	
		// Nếu chat đang hiển thị và click không phải trong overlay
		if (chatOverlay.style.display === 'block' && !chatOverlay.contains(e.target)) {
			chatOverlay.style.display = 'none';
		}
	});

	// Ngăn overlay nhận sự kiện click khi click trong chat
	chatOverlay.addEventListener('click', (e) => {
		e.stopPropagation();
	});

</script>
<script>
	/**
	 * Hiển thị text từng chữ (typewriter) trong chat
	 * @param {string} text Nội dung chat
	 * @param {HTMLElement} container Container để render text
	 * @param {number} speed Tốc độ từng chữ (ms)
	 */
	function typewriterChat(text, container, speed = 30) {
		container.textContent = '';
		container.dataset.skip = 'false';
		
		let i = 0;
		const interval = setInterval(() => {
			if (container.dataset.skip === 'true') {
				// Skip: show tất cả
				container.textContent = text;
				clearInterval(interval);
				return;
			}
			
			container.textContent += text[i];
			i++;
			container.scrollTop = container.scrollHeight; // auto scroll
			
			if (i >= text.length) {
				clearInterval(interval);
			}
		}, speed);
		
		// Click vào container sẽ skip
		container.onclick = () => {
			container.dataset.skip = 'true';
		};
	}
	
	/* Hàm mở chat */
	function showRPGChat(chatText, avatarSrc='assets/img/mayor_5.png') {
		const chatContent = document.getElementById('rpgChatContent');
		const avatarImg = chatOverlay.querySelector('.rpg-avatar img');
		
		avatarImg.src = avatarSrc;
		chatOverlay.style.display = 'block';
		
		
		// Typewriter effect
		typewriterChat(chatText, chatContent, 30);
	}
	
	/* Ẩn chat */
	function hideRPGChat() {
		document.getElementById('rpgChatOverlay').style.display = 'none';
	}

</script>

<script>
  /* ===============================
   MODAL CORE (REUSE OLD LOGIC)
================================ */
  const modal = document.getElementById("infoModal");
  const modalTitle = document.getElementById("modalTitle");
  const modalContent = document.getElementById("modalContent");
  const closeModal = document.getElementById("closeModal");

  /* Metadata modal – GIỮ NGUYÊN NHƯ CŨ */
  const modalData = {
    infoA: {
      title: "Thời gian event camp",
      template: "tpl-infoA"
    },
    infoB: {
      title: "⚔️ Giới thiệu về Cert",
      template: "tpl-infoB"
    },
    infoC: {
      title: "🔐 Code Heart Lock Zone",
      template: "tpl-infoC"
    },
    infoD: {
      title: "🛠️ Chi tiết Cert",
      template: "tpl-infoD"
    }
  };

  /* Hàm mở modal dùng chung */
  function openModalByKey(key) {
    const data = modalData[key];
    if (!data) return;

    modalTitle.textContent = data.title ?? "";
    modalContent.innerHTML = "";

    const tpl = document.getElementById(data.template);
    if (!tpl) return;

    modalContent.appendChild(tpl.content.cloneNode(true));

    modal.style.display = "flex";
  }

  /* Đóng modal */
  if (closeModal) {
    closeModal.onclick = () => (modal.style.display = "none");
  }

  if (modal) {
    modal.onclick = (e) => {
      if (e.target === modal) modal.style.display = "none";
    };
  }

  /* ===============================
     CYBER OVERLAY OPTION HANDLER
  ================================ */
  const cyberOverlay = document.getElementById("cyberOverlay");

  /* Map option text → modal key */
  const optionActions = {
    "Event Time": () => openModalByKey("infoA"),
    "Heart Lock Zone Code": () => openModalByKey("infoC"),
    "Cert Details": () => {
      openModalByKey("infoD");

      // 🔥 QUAN TRỌNG: init logic Cert sau khi modal render
      if (window.initCertSkill) {
        window.initCertSkill(modalContent);
      }
    },

    // Option khác (không mở modal)
    "Chat": () => {
      window.location.href = "chat.html";
    },
    "Tutorial": () => showRPGChat("Tutorial is coming soon 👀"),
    "Settings": () => showRPGChat("Settings is under development")
  };

  /* ===============================
     TOOLTIP CLICK LOGIC
  ================================ */
  const tooltipBoxes = document.querySelectorAll(
      ".hotspot-tooltip .tooltip-box"
  );

  const tooltipOptionsData = {
    mayorOptions: ["Chat", "Tutorial", "Settings"],
    controlOptions: [
      "Event Time",
      "Heart Lock Zone Code",
      "Cert Details"
    ]
  };

  tooltipBoxes.forEach((box) => {
    box.addEventListener("click", (e) => {
      e.stopPropagation();

      showRPGChat(
          "You’ve accessed the control panel. Choose an option."
      );

      // hiệu ứng viền
      box.classList.add("tooltip-pulse-border");

      setTimeout(() => {
        box.classList.remove("tooltip-pulse-border");

        const key = box.dataset.options;
        const options = tooltipOptionsData[key] || [];

        cyberOverlay.innerHTML = "";

        options.forEach((text, index) => {
          const optionEl = document.createElement("div");
          optionEl.className = "cyber-option";
          optionEl.textContent = text;

          optionEl.style.opacity = 0;
          optionEl.style.transform = "translateX(100%)";
          optionEl.style.animation =
              "slideIn 0.5s ease forwards";
          optionEl.style.animationDelay = `${index * 0.1}s`;

          optionEl.addEventListener("click", (ev) => {
            ev.stopPropagation();

            cyberOverlay.style.display = "none";

            // 👉 GỌI ACTION TƯƠNG ỨNG
            optionActions[text]?.() ??
            showRPGChat(`"${text}" chưa được hỗ trợ`);
          });

          cyberOverlay.appendChild(optionEl);
        });

        cyberOverlay.style.display = "flex";
      }, 500);
    });
  });

  /* Click ngoài overlay để đóng */
  cyberOverlay.addEventListener("click", (e) => {
    if (e.target === cyberOverlay)
      cyberOverlay.style.display = "none";
  });

</script>
