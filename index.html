<!-- CYBER LIST OVERLAY -->
<div id="cyberOverlay" class="cyber-overlay">
</div>


<div id="stage">
	<div id="ambient"></div>
	
	<!-- Video nền mặc định -->
	<video
		id="videoMain"
		class="bg-video active"
		src="assets/videos/mobile_workspace_mayor.mp4"
		autoplay
		muted
		loop
		playsinline
		preload="auto"
		style="will-change: opacity, transform; transform: translateZ(0);"
	></video>
	
	<!-- Video control panel preload sẵn -->
	<video
		id="videoAlt"
		class="bg-video"
		src="assets/videos/merged_control_panel.mp4"
		autoplay
		muted
		loop
		playsinline
		preload="auto"
		style="will-change: opacity, transform; transform: translateZ(0);"
	></video>
	
	<div id="videoTransitionMask"></div>
</div>

<div id="hotspot-layer">
  <div class="hotspot" data-x="620" data-y="360" >
    <div class="hotspot-dot"></div>

    <div class="hotspot-line"></div>

    <div class="hotspot-tooltip" id="control-panel">
      <div class="tooltip-box" data-options="mayorOptions">
        <div class="tooltip-title">MAYOR</div>
        <div class="tooltip-text">Talk</div>
      </div>
    </div>
  </div>
  <div class="hotspot" data-x="620" data-y="100" data-dir="left">
    <div class="hotspot-dot"></div>
    <div class="hotspot-line"></div>

    <div class="hotspot-tooltip" id="mayor-chat">
      <div class="tooltip-box" data-options="controlOptions">
        <div class="tooltip-title">CONTROL PANEL ACCESS</div>
        <div class="tooltip-text">Access</div>
      </div>
    </div>
  </div>
</div>

<!-- Overlay chat, ẩn mặc định -->
<div id="rpgChatOverlay">
	<div class="rpg-chat-box">
		<div class="rpg-avatar">
			<img src="assets/img/mayor_5.png" alt="Avatar">
		</div>
		<div class="rpg-chat-content" id="rpgChatContent">
			<!-- Text sẽ render từng chữ bằng JS -->
		</div>
	</div>
</div>


<div id="hope-clock" class="home-clock">
	<span>
		Hope 101 time:
		<span id="clock"></span>
	</span>
</div>

<button id="tutorialHelpBtn" class="tutorial"
        title="Xem lại hướng dẫn">
  ❔
</button>

<div id="loadingOverlay">
  <div class="loading-wrapper">
    <div class="loading-text">
      <span class="sao">SAO &nbsp;</span><span class="dem"> ĐÊM</span>
    </div>

    <div class="loading-progress">
      <div class="progress-bar" id="loadingProgress"></div>
      <div class="loading-info">
        <span id="loadingStatus">INITIALIZING...</span>
        <span id="loadingPercentage">0%</span>
      </div>
    </div>

    <div class="line top"></div>
    <div class="line bottom"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="infoModal">
  <div class="modal-content ai-modal-content">
    <h2 id="modalTitle"></h2>
    <div class="ai-training-box">
      <div class="ai-content" id="modalContent"></div>
    </div>
    <button id="closeModal" class="close-btn">Đóng</button>
  </div>
</div>


<!-- ================== MODAL TEMPLATES ================== -->

<template id="tpl-infoA">
  <div class="ai-title">
    Lưu ý: Đây là giờ VN, không phải giờ Ingame
  </div>
  <div>+ <span style="color: orange">Thứ 2 (19h – 20h30):</span> Nhặt hòm (Resource Scramble)</div>
  <div>+ <span style="color: orange">19h hằng ngày:</span> Patrol</div>
  <div>+ <span style="color: orange">21h30 tối thứ 3:</span> Def camp (Camp Invasion)</div>
  <div>+ <span style="color: orange">22h tối thứ 5:</span> Boss camp</div>


</template>

<template id="tpl-infoB">
  <div class="ai-section">

    <p class="ai-paragraph">
      📌 <b>Sau bản update ngày <span class="highlight">31/12/2025</span></b>, hệ thống
      <b>Cert</b> trong LifeAfter đã được <b>chia rõ rệt</b> và có nhiều cải tiến mới.
    </p>

    <p class="ai-paragraph">
      Ngoài <b>Cert chính</b>, người chơi giờ đây có thể chọn thêm
      <b class="neon-text">Cert Part-time (Cert phụ)</b>.
    </p>

    <div class="ai-warning">
      ⚠️ <b>Lưu ý quan trọng:</b><br>
      Cert phụ <u>không mở toàn bộ kỹ năng</u> của nghề đó.
      Hệ thống chỉ cho phép chọn <b>một số skill cố định</b>.
      <br><br>
      👉 Ví dụ: Không thể vừa chơi nghề súng, vừa chế tạo giáp – súng như nghề chế.
    </div>

    <!-- ===== NGHỀ CƠ BẢN ===== -->
    <h3 class="ai-title">⚔️ Nghề cơ bản</h3>
    <p class="ai-paragraph">
      Vẫn hoạt động như hệ thống cũ – cộng chỉ số trực tiếp và là nền tảng chính của nhân vật.
    </p>

    <img
        src="assets/img/guide/cert/basic_skill.png"
        class="ai-img"
        alt="Basic Cert Skill"
    >

    <p class="ai-paragraph">
      Các nhánh kỹ năng sẽ được lựa chọn <b>theo lối chơi của bạn</b>.
    </p>

    <img
        src="assets/img/guide/cert/skill_path.png"
        class="ai-img"
        alt="Cert Skill Path"
    >

    <!-- ===== NGHỀ PHỤ ===== -->
    <h3 class="ai-title">🧩 Nghề phụ (Cert Part-time)</h3>

    <p class="ai-paragraph">
      Người chơi được chọn <b>một nghề phụ</b> trong danh sách để hỗ trợ lối build.
    </p>

    <img
        src="assets/img/guide/cert/additional_skill.png"
        class="ai-img"
        alt="Additional Cert Skill"
    >

    <!-- ===== TÓM TẮT NGHỀ ===== -->
    <h3 class="ai-title">📋 Tóm tắt các nhóm nghề</h3>

    <div class="ai-list-block">
      <h4 class="ai-subtitle">🌿 Nghề Farm (thu thập nguyên liệu)</h4>
      <ul class="ai-list">
        <li>🌲 Logger – Nghề gỗ</li>
        <li>🌿 Hemp Picker – Hái lụm</li>
        <li>⛏️ Miner – Khai thác đá</li>
      </ul>
    </div>

    <div class="ai-list-block">
      <h4 class="ai-subtitle">🔥 Nghề Chiến Đấu</h4>
      <ul class="ai-list">
        <li>
          🔫 <b>Rifle</b> – Thuần chiến đấu, dame cao nhất hiện tại
        </li>
        <li>
          🧬 <b>Virus</b> – Vừa đánh vừa hỗ trợ, buff dame & hồi phục
        </li>
        <li>
          🛡️ <b>Warrior</b> – Cận chiến, tanky nhất trong PvP
        </li>
        <li class="dim">
          ⚔️ Ark Knight – Hỗ trợ là chính, dame thấp (❌ không khuyến nghị)
        </li>
      </ul>
    </div>

    <div class="ai-list-block">
      <h4 class="ai-subtitle">🛠️ Nghề Chế Tạo</h4>
      <ul class="ai-list">
        <li>
          Armor / Gun Maker / Upholstery – Chế nguyên liệu súng & giáp
        </li>
        <li class="note">
          👉 Phụ thuộc nguồn nguyên liệu từ nghề farm
        </li>
      </ul>
    </div>

  </div>
</template>

        <span class="code-chip">98</span>

        <span class="code-chip">1010</span>

<template id="tpl-infoD">
  <div class="skill-section" data-skill-root>

    <!-- JOB LIST (WHEEL VERSION) -->
    <div class="job-list job-wheel" data-job-wheel>
      <div class="job-wheel-track">

        <div class="job-item" data-job="rifle">
          <img src="assets/img/guide/cert_skills/rifle/rifle_symbol.png">
          <span>Rifle</span>
        </div>

        <div class="job-item" data-job="virus">
          <img src="https://picsum.photos/200?2">
          <span>Virus</span>
        </div>

        <div class="job-item" data-job="warrior">
          <img src="https://picsum.photos/200?3">
          <span>Warrior</span>
        </div>

      </div>
    </div>

    <!-- SKILL LIST -->
    <div class="skill-zone">
      <!-- BASIC SKILL -->
      <div class="skill-basic">
        <div class="skill-basic-label">Basic Skills</div>
        <div class="skill-list"></div>
      </div>

      <!-- SKILL TRAIT -->
      <div class="skill-trait">
        <div class="skill-trait-label">Skill Trait</div>

        <!-- CHỈ render vào đây -->
        <div class="skill-trait-content">
          <div class="skill-trait-placeholder">
            Skill phụ sẽ hiển thị ở đây
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 🔥 PANEL CHI TIẾT -->
  <div class="skill-detail-panel">
    <div class="skill-detail-placeholder">
      Chọn một skill để xem thông tin
    </div>
  </div>
</template>

<!-- Tutorial Overlay -->

  <div id="spotlight"></div>

  <div id="tooltip">

  </div>
