<!-- MODAL -->

  <div>+ <span style="color: orange">19h hằng ngày:</span> Patrol</div>
  <div>+ <span style="color: orange">21h30 tối thứ 3:</span> Def camp (Camp Invasion)</div>
  <div>+ <span style="color: orange">22h tối thứ 5:</span> Boss camp</div>


</template>

      <br><br>

<!-- Tutorial Overlay -->

<script src="assets/js/loading.js"></script>
<script src="assets/js/tutorial_index.js"></script>
<script src="assets/js/hope101_time.js"></script>
<script src="assets/js/heartlock_zone_info.js"></script>
<script src="assets/js/cert_detail_info.js"></script>
<script>
  const modal = document.getElementById("infoModal");
  const modalTitle = document.getElementById("modalTitle");
  const modalContent = document.getElementById("modalContent");
  const closeModal = document.getElementById("closeModal");

  // Chỉ còn metadata
  const modalData = {
    infoA: {
      title: "Thời gian event camp",
      template: "tpl-infoA"
    },
    infoB: {
      title: "⚔️ Giới thiệu về Cert",
      template: "tpl-infoB"
    },
    infoC: {
      title: "🔐 Code Heart Lock Zone",
      template: "tpl-infoC"
    },
    infoD: {
      title: "🛠️ Code Heart Lock Zone",
      template: "tpl-infoD"
    },

  };

  document.querySelectorAll(".info-card").forEach(card => {
    card.addEventListener("click", () => {
      const key = card.dataset.modal;
      const data = modalData[key];
      if (!data) return;

      modalTitle.textContent = data.title;

      // clear content cũ
      modalContent.innerHTML = "";

      // clone template
      const tpl = document.getElementById(data.template);
      modalContent.appendChild(tpl.content.cloneNode(true));

      modal.style.display = "flex";
    });
  });

  closeModal.onclick = () => modal.style.display = "none";
  modal.onclick = e => {
    if (e.target === modal) modal.style.display = "none";
  };
</script>
</body>
</html>
