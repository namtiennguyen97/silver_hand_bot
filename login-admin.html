<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN LOGIN - SILVERHAND</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #050a14;
            --primary: #00ffff;
            --primary-glow: rgba(0, 255, 255, 0.4);
            --danger: #ff3366;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(0, 255, 255, 0.2);
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }

        .login-card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(15px);
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--primary), transparent, var(--primary));
            z-index: -1;
            opacity: 0.3;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            letter-spacing: 4px;
            color: var(--primary);
            margin-bottom: 30px;
            text-shadow: 0 0 10px var(--primary-glow);
        }

        .input-wrapper {
            margin-bottom: 30px;
            position: relative;
        }

        input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            color: var(--primary);
            padding: 15px;
            text-align: center;
            font-size: 24px;
            letter-spacing: 10px;
            font-family: 'Orbitron', sans-serif;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .error-msg {
            color: var(--danger);
            font-size: 12px;
            margin-top: 10px;
            min-height: 18px;
            text-transform: uppercase;
        }

        .btn-login {
            width: 100%;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 15px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn-login:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .hint {
            margin-top: 30px;
            font-size: 10px;
            color: var(--text-dim);
            opacity: 0.5;
        }

        /* Numpad styles for faster input */
        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .num-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: #fff;
            padding: 15px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            transition: all 0.2s;
        }

        .num-btn:hover {
            background: var(--primary);
            color: #000;
        }

        .back-home {
            position: absolute;
            top: 30px;
            left: 30px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 10px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            z-index: 200;
            font-family: 'Orbitron', sans-serif;
        }
        .back-home:hover {
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary-glow);
        }
    </style>
</head>
<body>
    <div class="scanline"></div>

    <a href="index.html" class="back-home">
        <i class="fa-solid fa-arrow-left"></i> RETURN TO HUB
    </a>

    <div class="login-card">
        <h1>ADMIN_ACCESS</h1>
        <div class="input-wrapper">
            <input type="password" id="passwordInput" placeholder="••••••••" readonly>
            <div id="errorMsg" class="error-msg"></div>
        </div>

        <div class="numpad">
            <button class="num-btn" onclick="addNum('1')">1</button>
            <button class="num-btn" onclick="addNum('2')">2</button>
            <button class="num-btn" onclick="addNum('3')">3</button>
            <button class="num-btn" onclick="addNum('4')">4</button>
            <button class="num-btn" onclick="addNum('5')">5</button>
            <button class="num-btn" onclick="addNum('6')">6</button>
            <button class="num-btn" onclick="addNum('7')">7</button>
            <button class="num-btn" onclick="addNum('8')">8</button>
            <button class="num-btn" onclick="addNum('9')">9</button>
            <button class="num-btn" onclick="clearInput()" style="color: var(--danger)">CLR</button>
            <button class="num-btn" onclick="addNum('0')">0</button>
            <button class="num-btn" onclick="handleLogin()"><i class="fa-solid fa-check"></i></button>
        </div>

        <button class="btn-login" id="loginBtn" onclick="handleLogin()">AUTHORIZE</button>

        <div class="hint">
            // RESTRICTED AREA // AUTHORIZED PERSONNEL ONLY //
        </div>
    </div>

    <script>
        let password = '';
        const input = document.getElementById('passwordInput');
        const errorMsg = document.getElementById('errorMsg');
        const loginBtn = document.getElementById('loginBtn');

        function addNum(num) {
            if (password.length < 12) {
                password += num;
                input.value = '•'.repeat(password.length);
                errorMsg.textContent = '';
            }
        }

        function clearInput() {
            password = '';
            input.value = '';
            errorMsg.textContent = '';
        }

        async function handleLogin() {
            if (!password) return;

            loginBtn.disabled = true;
            loginBtn.textContent = 'VERIFYING...';
            errorMsg.textContent = '';

            try {
                const res = await fetch('/api/admin-auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await res.json();

                if (data.ok) {
                    localStorage.setItem('admin_token', data.token);
                    window.location.href = 'admin.html';
                } else {
                    errorMsg.textContent = 'ACCESS_DENIED: INVALID_KEY';
                    password = '';
                    input.value = '';
                }
            } catch (err) {
                errorMsg.textContent = 'SYSTEM_ERROR: CONNECTION_FAILED';
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'AUTHORIZE';
            }
        }

        // Allow keyboard input
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') addNum(e.key);
            if (e.key === 'Backspace') {
                password = password.slice(0, -1);
                input.value = '•'.repeat(password.length);
            }
            if (e.key === 'Enter') handleLogin();
            if (e.key === 'Escape') clearInput();
        });
    </script>
</body>
</html>
