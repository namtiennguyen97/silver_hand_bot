<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprite Demo — SAO-ĐÊM CHARACTER ENGINE</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon: #00f2ff;
      --pink: #ff00ea;
      --green: #39ff14;
      --yellow: #fefe33;
      --dark: #05050a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--dark);
      color: #fff;
      font-family: 'Share Tech Mono', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    /* ---- HEADER ---- */
    #topBar {
      background: rgba(0,0,0,0.9);
      border-bottom: 2px solid var(--neon);
      padding: 8px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #topBar .title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      color: var(--neon);
      text-shadow: 0 0 10px rgba(0,242,255,0.5);
    }
    #topBar .info {
      font-size: 0.75rem;
      color: #666;
    }
    #topBar a {
      background: rgba(255,255,255,0.1);
      border: 1px solid #444;
      color: #aaa;
      padding: 6px 14px;
      text-decoration: none;
      font-size: 0.75rem;
      transition: 0.2s;
    }
    #topBar a:hover { background: rgba(255,255,255,0.2); color: #fff; }

    /* ---- MAIN AREA ---- */
    #wrapper {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ---- CANVAS AREA ---- */
    #canvasWrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: linear-gradient(to bottom,
        #080d18 0%, #0a1222 60%, #12183a 100%);
    }
    /* Grid overlay */
    #canvasWrap::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,242,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,242,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    /* Floor line */
    #canvasWrap::after {
      content: '';
      position: absolute;
      bottom: 180px; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon), transparent);
      opacity: 0.3;
    }
    canvas#gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    /* ---- STATUS OVERLAY ---- */
    #statusOverlay {
      position: absolute;
      top: 12px; left: 12px;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(0,242,255,0.3);
      padding: 10px 16px;
      backdrop-filter: blur(6px);
      min-width: 200px;
    }
    .status-row { font-size: 0.7rem; color: #aaa; margin-bottom: 4px; }
    .status-row span { color: var(--neon); font-weight: 700; }
    #animName {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
      color: var(--yellow);
      margin-bottom: 6px;
    }

    /* ---- SIDEBAR CONTROLS ---- */
    #sidebar {
      width: 260px;
      background: rgba(0,0,0,0.85);
      border-left: 1px solid rgba(0,242,255,0.2);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .sb-section {
      padding: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .sb-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.65rem;
      color: #555;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
    /* Animation buttons */
    .anim-btn {
      display: block;
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #ccc;
      padding: 8px 12px;
      margin-bottom: 6px;
      text-align: left;
      cursor: pointer;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.78rem;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .anim-btn:hover {
      background: rgba(0,242,255,0.1);
      border-color: var(--neon);
      color: #fff;
    }
    .anim-btn.active {
      background: rgba(0,242,255,0.15);
      border-color: var(--neon);
      color: var(--neon);
      box-shadow: 0 0 10px rgba(0,242,255,0.2);
    }
    .anim-btn .badge {
      font-size: 0.6rem;
      padding: 2px 5px;
      border-radius: 2px;
      margin-left: auto;
    }
    .badge.has-sprite { background: var(--green); color: #000; }
    .badge.placeholder { background: #444; color: #aaa; }
    .btn-icon { font-size: 1.1rem; width: 20px; text-align: center; }

    /* Speed / Scale sliders */
    .slider-row {
      margin-bottom: 10px;
    }
    .slider-row label {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: #888;
      margin-bottom: 4px;
    }
    .slider-row label span { color: var(--neon); }
    input[type=range] {
      width: 100%;
      accent-color: var(--neon);
    }

    /* Flip toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.75rem;
      color: #aaa;
      margin-bottom: 8px;
    }
    .toggle-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid #444;
      color: #aaa;
      padding: 5px 14px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: 0.2s;
    }
    .toggle-btn.on {
      background: rgba(255,0,234,0.2);
      border-color: var(--pink);
      color: var(--pink);
    }

    /* Sprite preview strip */
    #spritePreview {
      padding: 14px;
    }
    #spritePreview canvas {
      width: 100%;
      border: 1px solid rgba(0,242,255,0.2);
      background: rgba(255,255,255,0.03);
      image-rendering: pixelated;
    }

    /* Scrollbar */
    #sidebar::-webkit-scrollbar { width: 4px; }
    #sidebar::-webkit-scrollbar-track { background: #000; }
    #sidebar::-webkit-scrollbar-thumb { background: #333; }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div id="topBar">
  <span class="title">CHARACTER SPRITE ENGINE // SAO-ĐÊM</span>
  <span class="info" id="fpsDisplay">FPS: --</span>
  <a href="drama.html">← DRAMA MAP</a>
</div>

<div id="wrapper">

  <!-- CANVAS AREA -->
  <div id="canvasWrap">
    <canvas id="gameCanvas"></canvas>

    <!-- Status overlay -->
    <div id="statusOverlay">
      <div id="animName">IDLE</div>
      <div class="status-row">Frame: <span id="frameNum">0</span> / <span id="totalFrames">0</span></div>
      <div class="status-row">Speed: <span id="speedDisplay">12</span> fps</div>
      <div class="status-row">Scale: <span id="scaleDisplay">2.0</span>x</div>
      <div class="status-row">Sprite: <span id="spriteSource">generated</span></div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div id="sidebar">

    <!-- ANIMATION LIST -->
    <div class="sb-section">
      <div class="sb-title">// ANIMATION STATES</div>

      <button class="anim-btn active" id="btn-idle" onclick="switchAnim('idle')">
        <span class="btn-icon">😌</span> IDLE (Breath)
        <span class="badge has-sprite">SPRITE</span>
      </button>
      <button class="anim-btn" id="btn-walk" onclick="switchAnim('walk')">
        <span class="btn-icon">🚶</span> WALK (No Weapon)
        <span class="badge has-sprite">SPRITE</span>
      </button>
      <button class="anim-btn" id="btn-run" onclick="switchAnim('run')">
        <span class="btn-icon">🏃</span> RUN FAST
        <span class="badge has-sprite">SPRITE</span>
      </button>
      <button class="anim-btn" id="btn-run_gun" onclick="switchAnim('run_gun')">
        <span class="btn-icon">🔫</span> RUN + DUAL GUN
        <span class="badge has-sprite">SPRITE</span>
      </button>
      <button class="anim-btn" id="btn-roll" onclick="switchAnim('roll')">
        <span class="btn-icon">💨</span> ROLL DODGE
        <span class="badge has-sprite">SPRITE</span>
      </button>
      <button class="anim-btn" id="btn-jump" onclick="switchAnim('jump')">
        <span class="btn-icon">🌀</span> BACKFLIP JUMP
        <span class="badge placeholder">GEN SOON</span>
      </button>
      <button class="anim-btn" id="btn-crouch" onclick="switchAnim('crouch')">
        <span class="btn-icon">🦆</span> CROUCH
        <span class="badge placeholder">GEN SOON</span>
      </button>
      <button class="anim-btn" id="btn-hit" onclick="switchAnim('hit')">
        <span class="btn-icon">💥</span> GOT HIT
        <span class="badge placeholder">GEN SOON</span>
      </button>
      <button class="anim-btn" id="btn-shoot" onclick="switchAnim('shoot')">
        <span class="btn-icon">🌠</span> SHOOT GUN
        <span class="badge placeholder">GEN SOON</span>
      </button>
      <button class="anim-btn" id="btn-ultimate" onclick="switchAnim('ultimate')">
        <span class="btn-icon">⚡</span> ULTIMATE SKILL
        <span class="badge placeholder">GEN SOON</span>
      </button>
      <button class="anim-btn" id="btn-throw" onclick="switchAnim('throw')">
        <span class="btn-icon">💊</span> THROW SERUM
        <span class="badge placeholder">GEN SOON</span>
      </button>
    </div>

    <!-- CONTROLS -->
    <div class="sb-section">
      <div class="sb-title">// PLAYBACK CONTROLS</div>
      <div class="slider-row">
        <label>Animation Speed <span id="speedLabel">12</span> fps</label>
        <input type="range" id="speedSlider" min="4" max="30" value="12" oninput="setSpeed(this.value)">
      </div>
      <div class="slider-row">
        <label>Character Scale <span id="scaleLabel">2.0</span>x</label>
        <input type="range" id="scaleSlider" min="1" max="5" step="0.5" value="2" oninput="setScale(this.value)">
      </div>
      <div class="toggle-row">
        Flip Horizontal:
        <button class="toggle-btn" id="flipBtn" onclick="toggleFlip()">OFF →</button>
      </div>
      <div class="toggle-row">
        Background FX:
        <button class="toggle-btn on" id="bgBtn" onclick="toggleBG()">ON</button>
      </div>
    </div>

    <!-- SPRITE STRIP PREVIEW -->
    <div id="spritePreview">
      <div class="sb-title">// CURRENT SPRITE STRIP</div>
      <canvas id="stripCanvas" height="80"></canvas>
    </div>

    <!-- FRAME MANUAL -->
    <div class="sb-section">
      <div class="sb-title">// FRAME CONFIG</div>
      <div class="slider-row">
        <label>Frame Width <span id="fwLabel">--</span>px</label>
        <input type="range" id="fwSlider" min="32" max="512" step="8" value="128" oninput="overrideFW(this.value)">
      </div>
      <div class="slider-row">
        <label>Frame Count <span id="fcLabel">--</span></label>
        <input type="range" id="fcSlider" min="2" max="16" step="1" value="6" oninput="overrideFC(this.value)">
      </div>
    </div>

  </div>
</div>

<script>
/* ========================================
   SPRITE ENGINE — SAO-ĐÊM Demo
======================================== */

// --- ANIMATION CONFIG ---
// For each animation we store: src, frameCount, frameWidth, frameHeight, fps, loop
const ANIM_CONFIG = {
  idle:    { src: 'assets/img/sprites/sprite_idle.png',    frameCount: 6, frameW: null, frameH: null, fps: 8,  loop: true },
  walk:    { src: 'assets/img/sprites/sprite_walk.png',    frameCount: 8, frameW: null, frameH: null, fps: 10, loop: true },
  run:     { src: 'assets/img/sprites/sprite_run.png',     frameCount: 8, frameW: null, frameH: null, fps: 14, loop: true },
  run_gun: { src: 'assets/img/sprites/sprite_run_gun.png', frameCount: 8, frameW: null, frameH: null, fps: 14, loop: true },
  roll:    { src: 'assets/img/sprites/sprite_roll.png',    frameCount: 8, frameW: null, frameH: null, fps: 16, loop: false },
  // Placeholders - drawn programmatically
  jump:    { src: null, frameCount: 8, frameW: 128, frameH: 192, fps: 12, loop: false },
  crouch:  { src: null, frameCount: 4, frameW: 128, frameH: 192, fps: 8,  loop: false },
  hit:     { src: null, frameCount: 4, frameW: 128, frameH: 192, fps: 10, loop: false },
  shoot:   { src: null, frameCount: 6, frameW: 128, frameH: 192, fps: 10, loop: true  },
  ultimate:{ src: null, frameCount: 8, frameW: 128, frameH: 192, fps: 8,  loop: false },
  throw:   { src: null, frameCount: 6, frameW: 128, frameH: 192, fps: 10, loop: false },
};

// --- ENGINE STATE ---
let state = {
  currentAnim: 'idle',
  currentFrame: 0,
  fps: 12,
  scale: 2,
  flipped: false,
  showBG: true,
  frameW: null,
  frameH: null,
  frameCount: null,
  userOverrideW: null,
  userOverrideC: null,
};

const sprites = {}; // Loaded Image objects

// Canvas
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const strip  = document.getElementById('stripCanvas');
const sCtx   = strip.getContext('2d');

let lastTime = 0, frameTimer = 0, fpsTimer = 0, fpsCount = 0, displayFps = 0;

// Character position on canvas
let charX, charY;

// Parallax BG particles
const particles = Array.from({ length: 40 }, () => ({
  x: Math.random(), y: Math.random(),
  speed: 0.0005 + Math.random() * 0.001,
  size: 1 + Math.random() * 2,
  opacity: 0.2 + Math.random() * 0.4
}));

// --- LOAD ALL SPRITES ---
function loadSprites() {
  for (const key in ANIM_CONFIG) {
    const cfg = ANIM_CONFIG[key];
    if (cfg.src) {
      const img = new Image();
      img.onload = () => {
        // Auto-detect frame width from image width / frameCount
        if (!cfg.frameW) {
          cfg.frameW = Math.floor(img.width / cfg.frameCount);
          cfg.frameH = img.height;
        }
        sprites[key] = img;
        if (key === state.currentAnim) applyCurrentConfig();
      };
      img.src = cfg.src;
    }
  }
}

function applyCurrentConfig() {
  const cfg = ANIM_CONFIG[state.currentAnim];
  state.frameW     = state.userOverrideW || cfg.frameW || 128;
  state.frameH     = cfg.frameH || 192;
  state.frameCount = state.userOverrideC || cfg.frameCount;
  state.fps        = cfg.fps;

  document.getElementById('fwLabel').textContent  = state.frameW;
  document.getElementById('fwSlider').value        = state.frameW;
  document.getElementById('fcLabel').textContent  = state.frameCount;
  document.getElementById('fcSlider').value        = state.frameCount;
  document.getElementById('speedSlider').value     = state.fps;
  document.getElementById('speedLabel').textContent = state.fps;
  document.getElementById('speedDisplay').textContent = state.fps;
  document.getElementById('totalFrames').textContent = state.frameCount;
  document.getElementById('spriteSource').textContent =
    sprites[state.currentAnim] ? 'generated' : 'placeholder';

  updateStripPreview();
}

function switchAnim(name) {
  if (state.currentAnim === name) return;
  state.currentAnim = name;
  state.currentFrame = 0;
  state.userOverrideW = null;
  state.userOverrideC = null;
  frameTimer = 0;

  // Update active btn
  document.querySelectorAll('.anim-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + name)?.classList.add('active');
  document.getElementById('animName').textContent = name.toUpperCase().replace('_', ' ');

  applyCurrentConfig();
}

// --- PLACEHOLDER CANVAS DRAW ---
// For animations without sprite files, draw a placeholder character
function drawPlaceholder(frameIndex) {
  const anim = state.currentAnim;
  const t = frameIndex / (state.frameCount - 1);

  // Simple silhouette representation
  const x = canvas.width / 2, y = charY;
  const h = 100 * state.scale;

  ctx.save();
  if (state.flipped) {
    ctx.translate(x * 2, 0);
    ctx.scale(-1, 1);
  }

  // Body glow
  ctx.shadowBlur = 20;
  ctx.shadowColor = '#00f2ff';

  // Head
  ctx.fillStyle = '#ddd';
  ctx.beginPath();
  ctx.arc(x, y - h * 0.9, h * 0.12, 0, Math.PI * 2);
  ctx.fill();

  // Hair (white flowing)
  ctx.fillStyle = '#eee';
  ctx.beginPath();
  ctx.ellipse(x, y - h * 0.85, h * 0.14, h * 0.2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = '#ccc';
  ctx.strokeStyle = '#00f2ff';
  ctx.lineWidth = 2;
  const bodyOffset = animOffset(anim, frameIndex);
  ctx.fillRect(x - h * 0.12, y - h * 0.75 + bodyOffset, h * 0.24, h * 0.38);
  ctx.strokeRect(x - h * 0.12, y - h * 0.75 + bodyOffset, h * 0.24, h * 0.38);

  // Legs
  const legPhase = frameIndex * (Math.PI * 2 / state.frameCount);
  ctx.strokeStyle = '#bbb';
  ctx.lineWidth = h * 0.06;
  ctx.lineCap = 'round';

  // Left leg
  ctx.beginPath();
  ctx.moveTo(x - h * 0.06, y - h * 0.37 + bodyOffset);
  ctx.lineTo(x - h * 0.04 + Math.sin(legPhase) * h * 0.15,
             y + Math.cos(legPhase) * h * 0.1);
  ctx.stroke();

  // Right leg
  ctx.beginPath();
  ctx.moveTo(x + h * 0.06, y - h * 0.37 + bodyOffset);
  ctx.lineTo(x + h * 0.04 - Math.sin(legPhase) * h * 0.15,
             y - Math.cos(legPhase) * h * 0.1);
  ctx.stroke();

  // Arms
  const armPhase = legPhase + Math.PI;
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = h * 0.05;
  ctx.beginPath();
  ctx.moveTo(x - h * 0.12, y - h * 0.65 + bodyOffset);
  ctx.lineTo(x - h * 0.12 + Math.sin(armPhase) * h * 0.18,
             y - h * 0.45 + bodyOffset + Math.cos(armPhase) * h * 0.05);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x + h * 0.12, y - h * 0.65 + bodyOffset);
  ctx.lineTo(x + h * 0.12 - Math.sin(armPhase) * h * 0.18,
             y - h * 0.45 + bodyOffset - Math.cos(armPhase) * h * 0.05);
  ctx.stroke();

  // Special effect for certain anims
  if (anim === 'ultimate') {
    ctx.shadowBlur = 40;
    ctx.shadowColor = '#ff00ea';
    ctx.strokeStyle = '#ff00ea';
    ctx.lineWidth = 3;
    const blastR = t * h * 0.6;
    ctx.beginPath();
    ctx.arc(x, y - h * 0.5, blastR, 0, Math.PI * 2);
    ctx.stroke();
  }
  if (anim === 'throw') {
    // Draw serum object
    const throwX = x + (flipped ? -1 : 1) * t * 80 * state.scale;
    const throwY = y - h * 0.7 - t * 40 * state.scale;
    ctx.fillStyle = '#39ff14';
    ctx.shadowColor = '#39ff14';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.ellipse(throwX, throwY, 8, 14, Math.PI / 4, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function animOffset(anim, frame) {
  // Vertical offset per anim type
  switch(anim) {
    case 'jump': return -Math.sin(frame / (state.frameCount - 1) * Math.PI) * 60 * state.scale;
    case 'crouch': return 20 * state.scale;
    case 'hit': return frame % 2 === 0 ? -5 : 5;
    default: return 0;
  }
}

// --- MAIN RENDER LOOP ---
function render(timestamp) {
  requestAnimationFrame(render);

  const dt = timestamp - lastTime;
  lastTime = timestamp;
  frameTimer += dt;

  // FPS counter
  fpsTimer += dt;
  fpsCount++;
  if (fpsTimer >= 500) {
    displayFps = Math.round(fpsCount * 1000 / fpsTimer);
    document.getElementById('fpsDisplay').textContent = `FPS: ${displayFps}`;
    fpsTimer = 0; fpsCount = 0;
  }

  const interval = 1000 / state.fps;
  if (frameTimer >= interval) {
    frameTimer -= interval;
    advanceFrame();
  }

  drawScene();
}

function advanceFrame() {
  const cfg = ANIM_CONFIG[state.currentAnim];
  state.currentFrame++;
  if (state.currentFrame >= state.frameCount) {
    state.currentFrame = cfg.loop ? 0 : state.frameCount - 1;
  }
  document.getElementById('frameNum').textContent = state.currentFrame;
}

function drawScene() {
  // Resize canvas to wrapper
  const wrap = document.getElementById('canvasWrap');
  if (canvas.width !== wrap.clientWidth || canvas.height !== wrap.clientHeight) {
    canvas.width  = wrap.clientWidth;
    canvas.height = wrap.clientHeight;
    charX = canvas.width / 2;
    charY = canvas.height - 180;
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // BG gradient
  if (state.showBG) {
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, '#080d18');
    grad.addColorStop(0.6, '#0a1222');
    grad.addColorStop(1, '#12183a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Particles
    for (const p of particles) {
      p.x -= p.speed;
      if (p.x < 0) { p.x = 1; p.y = Math.random(); }
      ctx.fillStyle = `rgba(0,242,255,${p.opacity})`;
      ctx.beginPath();
      ctx.arc(p.x * canvas.width, p.y * canvas.height, p.size, 0, Math.PI * 2);
      ctx.fill();
    }

    // Floor glow
    const floorGrad = ctx.createLinearGradient(0, charY, 0, charY + 60);
    floorGrad.addColorStop(0, 'rgba(0,242,255,0.08)');
    floorGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = floorGrad;
    ctx.fillRect(0, charY, canvas.width, 60);

    // Floor line
    ctx.strokeStyle = 'rgba(0,242,255,0.25)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, charY);
    ctx.lineTo(canvas.width, charY);
    ctx.stroke();

    // Grid lines (floor perspective)
    ctx.strokeStyle = 'rgba(0,242,255,0.05)';
    for (let i = 1; i <= 10; i++) {
      ctx.beginPath();
      ctx.moveTo(canvas.width / 2, charY);
      ctx.lineTo(i % 2 === 0 ? canvas.width : 0, charY + 100);
      ctx.stroke();
    }
  }

  // Draw sprite or placeholder
  const img = sprites[state.currentAnim];
  if (img && state.frameW) {
    const fw  = state.frameW;
    const fh  = state.frameH || img.height;
    const dw  = fw * state.scale;
    const dh  = fh * state.scale;
    const sx  = state.currentFrame * fw;
    const sy  = 0;
    const dx  = charX - dw / 2;
    const dy  = charY - dh;

    ctx.save();
    if (state.flipped) {
      ctx.translate(charX * 2, 0);
      ctx.scale(-1, 1);
    }

    // Shadow under feet
    ctx.shadowBlur = 30;
    ctx.shadowColor = '#00f2ff';
    ctx.drawImage(img, sx, sy, fw, fh, dx, dy, dw, dh);
    ctx.shadowBlur = 0;
    ctx.restore();

    // Floor shadow ellipse
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(charX, charY + 5, dw * 0.4, 8 * state.scale * 0.2, 0, 0, Math.PI * 2);
    ctx.fill();

  } else {
    // Placeholder draw
    drawPlaceholder(state.currentFrame);
  }

  // currentFrame label in center canvas
  ctx.fillStyle = 'rgba(0,242,255,0.15)';
  ctx.font = 'bold 10px Share Tech Mono';
  ctx.fillText(`[${state.currentFrame}]`, charX - 10, charY + 20);
}

// --- STRIP PREVIEW ---
function updateStripPreview() {
  const img = sprites[state.currentAnim];
  const fc = state.frameCount;
  const fw = state.frameW || 128;
  const fh = state.frameH || 192;

  strip.width  = 232;
  strip.height = 80;

  if (!img) {
    sCtx.fillStyle = '#111';
    sCtx.fillRect(0, 0, strip.width, strip.height);
    sCtx.fillStyle = '#444';
    sCtx.font = '11px Share Tech Mono';
    sCtx.fillText('No sprite — using placeholder', 4, 48);
    return;
  }

  sCtx.clearRect(0, 0, strip.width, strip.height);
  sCtx.fillStyle = '#0a0a0a';
  sCtx.fillRect(0, 0, strip.width, strip.height);

  const thumbW = strip.width / fc;
  const thumbH = strip.height;
  for (let i = 0; i < fc; i++) {
    sCtx.drawImage(img, i * fw, 0, fw, fh, i * thumbW, 0, thumbW, thumbH);
    sCtx.strokeStyle = 'rgba(0,242,255,0.3)';
    sCtx.lineWidth = 0.5;
    sCtx.strokeRect(i * thumbW, 0, thumbW, thumbH);
  }
}

// --- CONTROLS ---
function setSpeed(v) {
  state.fps = parseInt(v);
  ANIM_CONFIG[state.currentAnim].fps = state.fps;
  document.getElementById('speedLabel').textContent  = v;
  document.getElementById('speedDisplay').textContent = v;
}

function setScale(v) {
  state.scale = parseFloat(v);
  document.getElementById('scaleLabel').textContent  = v;
  document.getElementById('scaleDisplay').textContent = parseFloat(v).toFixed(1);
}

function toggleFlip() {
  state.flipped = !state.flipped;
  const btn = document.getElementById('flipBtn');
  btn.textContent = state.flipped ? '← ON' : 'OFF →';
  btn.classList.toggle('on', state.flipped);
}

function toggleBG() {
  state.showBG = !state.showBG;
  const btn = document.getElementById('bgBtn');
  btn.textContent = state.showBG ? 'ON' : 'OFF';
  btn.classList.toggle('on', state.showBG);
}

function overrideFW(v) {
  state.userOverrideW = parseInt(v);
  state.frameW = state.userOverrideW;
  document.getElementById('fwLabel').textContent = v;
  updateStripPreview();
}

function overrideFC(v) {
  state.userOverrideC = parseInt(v);
  state.frameCount = state.userOverrideC;
  document.getElementById('fcLabel').textContent = v;
  document.getElementById('totalFrames').textContent = v;
  updateStripPreview();
}

// --- KEYBOARD SHORTCUTS ---
document.addEventListener('keydown', (e) => {
  const keys = {
    'q': 'idle', 'w': 'walk', 'e': 'run', 'r': 'run_gun',
    'f': 'roll', 'j': 'jump', 'c': 'crouch', 'h': 'hit',
    's': 'shoot', 'u': 'ultimate', 't': 'throw'
  };
  if (keys[e.key]) switchAnim(keys[e.key]);
  if (e.key === 'x') toggleFlip();
  if (e.key === 'b') toggleBG();
});

// --- INIT ---
loadSprites();
applyCurrentConfig();
requestAnimationFrame(render);
</script>
</body>
</html>
